<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout-game :: layout('Phòng chơi', ~{::section})}">
<section class="room-page">
    <!-- Custom Room Styles -->
    <style>
        /* ==================== ROOM VARIABLES ==================== */
        :root {
            --room-primary: #8b5cf6;
            --room-primary-glow: rgba(139, 92, 246, 0.5);
            --room-secondary: #06b6d4;
            --room-secondary-glow: rgba(6, 182, 212, 0.5);
            --room-accent: #f59e0b;
            --room-accent-glow: rgba(245, 158, 11, 0.5);
            --room-success: #10b981;
            --room-success-glow: rgba(16, 185, 129, 0.5);
            --room-danger: #ef4444;
            --room-danger-glow: rgba(239, 68, 68, 0.4);
            --room-dark: #0a0a0f;
            --room-card: rgba(15, 15, 25, 0.95);
            --room-border: rgba(139, 92, 246, 0.2);
            --room-text: #e2e8f0;
            --room-text-muted: rgba(255, 255, 255, 0.6);
        }

        /* ==================== ROOM PAGE ==================== */
        .room-page {
            min-height: 100vh;
            position: relative;
        }

        /* ==================== ROOM HUD ==================== */
        .room-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: linear-gradient(135deg, 
                rgba(15, 15, 25, 0.95) 0%, 
                rgba(30, 30, 50, 0.9) 100%);
            border: 1px solid var(--room-border);
            border-radius: 20px;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .room-hud::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                var(--room-primary), 
                var(--room-secondary), 
                var(--room-accent));
            animation: hudGlow 3s linear infinite;
        }

        @keyframes hudGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .room-hud-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .room-hud h1 {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #fff, var(--room-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .room-hud h1 i {
            font-size: 1.4rem;
            color: var(--room-primary);
            filter: drop-shadow(0 0 10px var(--room-primary-glow));
        }

        .room-hud p {
            color: var(--room-text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        /* ==================== HUD STATS ==================== */
        .hud-stats {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .hud-stat {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .hud-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .hud-stat:hover::before {
            left: 100%;
        }

        .hud-stat:hover {
            transform: translateY(-2px) scale(1.02);
        }

        .hud-stat i {
            font-size: 1rem;
        }

        .hud-stat.step {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #fbbf24;
        }

        .hud-stat.step:hover {
            box-shadow: 0 8px 25px var(--room-accent-glow);
        }

        .hud-stat.score {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .hud-stat.score:hover {
            box-shadow: 0 8px 25px var(--room-success-glow);
        }

        .hud-stat.wrong {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .hud-stat.wrong:hover {
            box-shadow: 0 8px 25px var(--room-danger-glow);
        }

        /* ==================== SCENE WRAPPER ==================== */
        .simple-scene-wrap {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
        }

        .simple-scene {
            position: relative;
            width: 100%;
            min-height: 500px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
            border: 2px solid var(--room-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 0 100px rgba(139, 92, 246, 0.05);
        }

        .fps-canvas-wrap {
            position: absolute;
            inset: 0;
            z-index: 20;
            border-radius: 24px;
            overflow: hidden;
            cursor: crosshair;
        }

        body.fps-docked .fps-canvas-wrap {
            inset: 1rem auto auto 1rem;
            width: min(420px, 38vw);
            height: min(300px, 34vh);
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            box-shadow: 0 16px 36px rgba(2, 6, 23, 0.55);
            background: rgba(3, 9, 22, 0.92);
            z-index: 130;
        }

        .fps-canvas-wrap canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .fps-crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 115;
        }

        .fps-crosshair::before,
        .fps-crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.6);
        }

        .fps-crosshair::before {
            width: 2px;
            height: 24px;
            left: 11px;
            top: 0;
        }

        .fps-crosshair::after {
            width: 24px;
            height: 2px;
            left: 0;
            top: 11px;
        }

        .fps-help-bar {
            position: absolute;
            left: 50%;
            bottom: 0.9rem;
            transform: translateX(-50%);
            z-index: 120;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.65rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(6, 182, 212, 0.45);
            background: rgba(4, 10, 24, 0.8);
            color: #dbeafe;
            font-size: 0.86rem;
            backdrop-filter: blur(8px);
        }

        body.fps-docked .fps-help-bar {
            left: 0.6rem;
            right: 0.6rem;
            bottom: 0.5rem;
            transform: none;
            justify-content: center;
            gap: 0.45rem;
            padding: 0.5rem 0.55rem;
            font-size: 0.72rem;
            flex-wrap: wrap;
            border-radius: 10px;
        }

        .fps-hint-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 1px solid rgba(245, 158, 11, 0.7);
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .fps-hint-dynamic {
            position: absolute;
            top: 4.3rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 140;
            padding: 0.55rem 0.9rem;
            border-radius: 10px;
            border: 1px solid rgba(16, 185, 129, 0.6);
            background: rgba(3, 24, 18, 0.85);
            color: #86efac;
            font-size: 0.84rem;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        body.fps-docked .fps-hint-dynamic {
            top: 0.6rem;
            left: 0.6rem;
            right: 0.6rem;
            transform: none;
            text-align: center;
            font-size: 0.75rem;
        }

        .fps-hint-dynamic.show {
            opacity: 1;
        }

        /* MINIMAP REMOVED - Using 3D view only */
        .fps-minimap {
            display: none !important;
        }

        /* Hide legacy 2D layer permanently: room now runs in 3D-only mode. */
        .simple-hotspot,
        .scene-collect-spot,
        .simple-scene-player,
        .simple-scene-player-name {
            display: none;
        }

        body.fps-fullscreen .room-hud {
            position: fixed;
            top: 0.9rem;
            left: 4.7rem;
            transform: none;
            width: auto;
            max-width: min(58vw, 680px);
            padding: 0.65rem 0.85rem;
            gap: 0.6rem;
            border-radius: 14px;
            z-index: 1295;
            margin: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        body.fps-fullscreen.fps-hud-hidden .room-hud {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
        }

        body.fps-fullscreen .room-hud-info {
            gap: 0;
        }

        body.fps-fullscreen .room-hud h1 {
            font-size: 1.02rem;
            margin: 0;
        }

        body.fps-fullscreen .room-hud p {
            display: none;
        }

        body.fps-fullscreen .hud-stats {
            gap: 0.45rem;
        }

        body.fps-fullscreen .hud-stat {
            padding: 0.35rem 0.6rem;
            font-size: 0.75rem;
            border-radius: 9px;
        }

        body.fps-fullscreen .game-topbar,
        body.fps-fullscreen .game-footer {
            display: none !important;
        }

        body.fps-fullscreen .page.game-shell,
        body.fps-fullscreen .app-shell.game-shell {
            width: 100vw !important;
            max-width: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        body.fps-fullscreen .app-shell.game-shell::before,
        body.fps-fullscreen .app-shell.game-shell::after,
        body.fps-fullscreen .app-shell.game-shell .scanline {
            display: none !important;
        }

        body.fps-fullscreen .simple-scene-wrap {
            position: fixed;
            inset: 0;
            z-index: 1200;
            border-radius: 0;
            margin: 0;
        }

        body.fps-fullscreen .simple-scene {
            min-height: 100vh;
            border-radius: 0;
            border: none;
            box-shadow: none;
        }

        body.fps-fullscreen .scene-topbar {
            z-index: 1300;
        }

        body.fps-docked .scene-topbar {
            z-index: 135;
        }

        /* Scene Backgrounds */
        .simple-scene.scene-bg-history1 {
            background: linear-gradient(180deg, #2d1b0e 0%, #1a1006 100%);
        }

        .simple-scene.scene-bg-history2 {
            background: linear-gradient(180deg, #1a0a2e 0%, #0f0520 100%);
        }

        .simple-scene.scene-bg-science1 {
            background: linear-gradient(180deg, #0a1a2e 0%, #051520 100%);
        }

        .simple-scene.scene-bg-science2 {
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
        }

        .simple-scene.scene-mystic::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 30%);
            pointer-events: none;
            animation: mysticPulse 8s ease-in-out infinite;
        }

        @keyframes mysticPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ==================== SCENE TOPBAR ==================== */
        .scene-topbar {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }

        .scene-icon-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--room-border);
            border-radius: 12px;
            color: var(--room-text);
            font-size: 1.2rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .scene-icon-btn:hover {
            background: rgba(139, 92, 246, 0.3);
            border-color: var(--room-primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--room-primary-glow);
        }

        .scene-icon-btn i {
            font-size: 1rem;
        }

        /* ==================== SCENE FEEDBACK ==================== */
        .scene-feedback {
            display: none !important;
        }

        .game-toast-host {
            position: fixed;
            top: 5.7rem;
            left: 1rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            pointer-events: none;
        }

        .game-toast {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            max-width: min(42vw, 320px);
            padding: 0.45rem 0.7rem;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            line-height: 1.3;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
            background: rgba(7, 16, 30, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.45);
            color: #e2e8f0;
            opacity: 0;
            transform: translateY(-6px);
            transition: all 0.18s ease;
        }

        .game-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .game-toast.success {
            border-color: rgba(16, 185, 129, 0.6);
            color: #86efac;
        }

        .game-toast.error {
            border-color: rgba(239, 68, 68, 0.6);
            color: #fca5a5;
        }

        .game-toast-icon {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 0.84rem;
            flex-shrink: 0;
        }

        .scene-feedback::before {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.2rem;
        }

        .scene-feedback.show {
            transform: translateY(0);
            opacity: 1;
        }

        .scene-feedback.success {
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #34d399;
            box-shadow: 0 10px 40px var(--room-success-glow);
        }

        .scene-feedback.success::before {
            content: '\f058';
            color: var(--room-success);
        }

        .scene-feedback.error {
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
            box-shadow: 0 10px 40px var(--room-danger-glow);
            animation: feedbackShake 0.5s ease;
        }

        .scene-feedback.error::before {
            content: '\f06a';
            color: var(--room-danger);
        }

        @keyframes feedbackShake {
            0%, 100% { transform: translateY(0); }
            20%, 60% { transform: translateX(-8px) translateY(0); }
            40%, 80% { transform: translateX(8px) translateY(0); }
        }

        /* ==================== INVENTORY BUTTON ==================== */
        .scene-inventory {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.2rem;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(6, 182, 212, 0.3));
            border: 1px solid var(--room-border);
            border-radius: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .scene-inventory:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.5), rgba(6, 182, 212, 0.5));
            border-color: var(--room-primary);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px var(--room-primary-glow);
        }

        .scene-inventory-icon {
            font-size: 1.5rem;
        }

        .scene-inventory-count {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--room-accent), #fbbf24);
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 700;
            color: #000;
        }

        /* ==================== BAG PANEL ==================== */
        .scene-bag-panel {
            position: absolute;
            top: 70px;
            right: 1rem;
            width: 320px;
            max-height: 400px;
            background: rgba(15, 15, 25, 0.98);
            border: 1px solid var(--room-border);
            border-radius: 20px;
            z-index: 150;
            overflow: hidden;
            backdrop-filter: blur(30px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: bagSlideIn 0.3s ease;
        }

        @keyframes bagSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .scene-bag-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(6, 182, 212, 0.2));
            border-bottom: 1px solid var(--room-border);
        }

        .scene-bag-header h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .scene-bag-header h3::before {
            content: '\f553';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--room-primary);
        }

        .scene-bag-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            color: var(--room-text);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scene-bag-close:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        /* ==================== INVENTORY GRID ==================== */
        .inventory-grid {
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .inventory-grid::-webkit-scrollbar {
            width: 6px;
        }

        .inventory-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .inventory-grid::-webkit-scrollbar-thumb {
            background: var(--room-primary);
            border-radius: 3px;
        }

        .inventory-item-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--room-border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .inventory-item-chip:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--room-primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--room-primary-glow);
        }

        .inventory-item-chip.selected {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(16, 185, 129, 0.1));
            border-color: var(--room-success);
            box-shadow: 0 0 20px var(--room-success-glow);
        }

        .inventory-item-chip.newly-added {
            animation: itemPop 0.5s ease;
        }

        @keyframes itemPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .inventory-icon {
            font-size: 2rem;
        }

        .inventory-icon-image {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .inventory-item-label {
            font-size: 0.8rem;
            color: var(--room-text);
            text-align: center;
        }

        .bag-empty {
            grid-column: span 2;
            text-align: center;
            padding: 2rem;
            color: var(--room-text-muted);
            font-size: 0.9rem;
        }

        .bag-empty::before {
            content: '\f49e';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            display: block;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }

        /* ==================== LATHE COMBINE PANEL ==================== */
        .lathe-combine-panel {
            position: absolute;
            top: 70px;
            right: 1rem;
            width: min(380px, 94vw);
            max-height: 76vh;
            background: rgba(11, 16, 30, 0.96);
            border: 1px solid rgba(6, 182, 212, 0.4);
            border-radius: 20px;
            z-index: 180;
            overflow: hidden;
            backdrop-filter: blur(18px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .lathe-panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1rem;
            border-bottom: 1px solid rgba(6, 182, 212, 0.35);
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(14, 116, 144, 0.2));
        }

        .lathe-panel-head h3 {
            margin: 0;
            font-size: 1rem;
            color: #e0f2fe;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .lathe-panel-head h3 i {
            color: #22d3ee;
        }

        .lathe-panel-body {
            padding: 0.9rem;
            display: grid;
            gap: 0.8rem;
        }

        .lathe-pool {
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 12px;
            padding: 0.65rem;
            background: rgba(15, 23, 42, 0.75);
            max-height: 220px;
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
        }

        .lathe-pool-item {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            background: rgba(30, 41, 59, 0.76);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.5rem;
            cursor: grab;
            font-size: 0.76rem;
        }

        .lathe-pool-item:active {
            cursor: grabbing;
        }

        .lathe-pool-item img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .lathe-empty-note {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(226, 232, 240, 0.7);
            font-size: 0.8rem;
            padding: 0.5rem 0;
        }

        .lathe-combine-slots {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.65rem;
        }

        .lathe-slot {
            min-height: 84px;
            border: 1px dashed rgba(251, 191, 36, 0.6);
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            color: #fef3c7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            text-align: center;
            padding: 0.4rem;
            font-size: 0.78rem;
        }

        .lathe-slot.drag-over {
            border-color: #34d399;
            background: rgba(16, 185, 129, 0.16);
        }

        .lathe-slot strong {
            color: #e2e8f0;
            font-size: 0.76rem;
            line-height: 1.2;
            font-weight: 600;
        }

        .lathe-slot img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .lathe-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .lathe-actions button {
            border: none;
            border-radius: 10px;
            padding: 0.65rem 0.8rem;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
        }

        .lathe-combine-btn {
            background: linear-gradient(135deg, #0ea5e9, #22d3ee);
            color: #062033;
        }

        .lathe-combine-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .lathe-clear-btn {
            background: rgba(71, 85, 105, 0.62);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        /* ==================== HOTSPOTS ==================== */
        .simple-hotspot {
            position: absolute;
            z-index: 50;
        }

        .simple-hotspot.pos-1 { left: 15%; top: 60%; }
        .simple-hotspot.pos-2 { left: 35%; top: 50%; }
        .simple-hotspot.pos-3 { left: 55%; top: 55%; }
        .simple-hotspot.pos-4 { left: 75%; top: 45%; }
        .simple-hotspot.pos-5 { left: 25%; top: 70%; }
        .simple-hotspot.pos-6 { left: 65%; top: 65%; }

        .simple-target {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--room-border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--room-text);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            cursor: pointer;
            min-width: 120px;
        }

        .simple-target.ready {
            border-color: var(--room-accent);
            animation: targetPulse 2s ease-in-out infinite;
        }

        @keyframes targetPulse {
            0%, 100% { 
                box-shadow: 0 0 20px var(--room-accent-glow);
            }
            50% { 
                box-shadow: 0 0 40px var(--room-accent-glow), 0 0 60px var(--room-accent-glow);
            }
        }

        .simple-target:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--room-primary);
            box-shadow: 0 20px 50px var(--room-primary-glow);
        }

        .target-arrow {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: var(--room-accent);
            animation: arrowBounce 1s ease-in-out infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .simple-target-icon {
            font-size: 2.5rem;
        }

        .simple-target-icon img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .simple-target strong {
            font-size: 0.9rem;
            text-align: center;
        }

        .simple-target-sub {
            font-size: 0.75rem;
            color: var(--room-accent);
            text-align: center;
        }

        /* Object State Badges */
        .object-state-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
        }

        .object-state-badge.done {
            background: linear-gradient(135deg, var(--room-success), #34d399);
            color: #fff;
            box-shadow: 0 5px 20px var(--room-success-glow);
        }

        .object-state-badge.locked {
            background: rgba(100, 116, 139, 0.3);
            color: #64748b;
            border: 1px dashed #64748b;
        }

        /* ==================== SCANNER READY ==================== */
        .simple-target.scanner-ready {
            animation: scannerWiggle 0.5s ease-in-out infinite;
            border-color: var(--room-success);
        }

        @keyframes scannerWiggle {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        /* ==================== COLLECTIBLE SPOTS ==================== */
        .scene-collect-spot {
            position: absolute;
            z-index: 60;
        }

        .cabinet-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .cabinet-door {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--room-border);
            border-radius: 12px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.4s ease;
            z-index: 2;
        }

        .cabinet-container.open .cabinet-door {
            transform: perspective(500px) rotateY(-120deg);
            transform-origin: left center;
        }

        .cabinet-interior {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border: 2px solid var(--room-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .hidden-key-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 2rem;
            transition: all 0.3s ease;
            animation: keyGlow 1.5s ease-in-out infinite;
        }

        @keyframes keyGlow {
            0%, 100% { filter: drop-shadow(0 0 5px var(--room-accent-glow)); }
            50% { filter: drop-shadow(0 0 20px var(--room-accent-glow)); }
        }

        .hidden-key-btn:hover {
            transform: scale(1.2);
        }

        .collect-spot-image {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        /* ==================== PLAYER ==================== */
        .simple-scene-player {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            filter: drop-shadow(0 5px 20px rgba(0, 0, 0, 0.5));
            animation: playerIdle 3s ease-in-out infinite;
            z-index: 40;
        }

        @keyframes playerIdle {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        .simple-scene-player-name {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.4rem 1rem;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--room-border);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--room-text);
            z-index: 41;
        }

        /* ==================== MYSTIC NODES ==================== */
        .mystic-nodes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .mystic-node {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--room-primary);
            border-radius: 50%;
            animation: nodeFloat 5s ease-in-out infinite;
        }

        .node-a { top: 20%; left: 10%; animation-delay: 0s; }
        .node-b { top: 30%; right: 15%; animation-delay: 1s; }
        .node-c { bottom: 25%; left: 20%; animation-delay: 2s; }
        .node-d { bottom: 35%; right: 10%; animation-delay: 3s; }

        @keyframes nodeFloat {
            0%, 100% { 
                transform: translateY(0) scale(1);
                box-shadow: 0 0 10px var(--room-primary-glow);
            }
            50% { 
                transform: translateY(-20px) scale(1.5);
                box-shadow: 0 0 30px var(--room-primary-glow);
            }
        }

        /* ==================== LAB CABINET ==================== */
        .lab-wall-cabinet {
            position: absolute;
            top: 10%;
            right: 5%;
            width: 120px;
            height: auto;
            opacity: 0.8;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.5));
        }

        /* ==================== QUIZ OVERLAY ==================== */
        .scene-quiz-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .scene-quiz-card {
            width: 90%;
            max-width: 500px;
            background: var(--room-card);
            border: 1px solid var(--room-border);
            border-radius: 24px;
            padding: 2rem;
            animation: quizSlideIn 0.4s ease;
        }

        @keyframes quizSlideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .inline-quiz-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--room-border);
        }

        .inline-quiz-head h2 {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .inline-quiz-head h2::before {
            content: '\f059';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--room-primary);
        }

        .quiz-title {
            font-size: 1.1rem;
            color: var(--room-text);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .quiz-grid {
            display: grid;
            gap: 1rem;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--room-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quiz-option:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--room-primary);
        }

        .quiz-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--room-primary);
        }

        .quiz-option input[type="radio"]:checked + span {
            color: var(--room-primary);
            font-weight: 600;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: var(--room-text);
        }

        .field input {
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--room-border);
            border-radius: 12px;
            color: var(--room-text);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .field input:focus {
            outline: none;
            border-color: var(--room-primary);
            box-shadow: 0 0 0 3px var(--room-primary-glow);
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .actions button[type="submit"] {
            flex: 1;
            padding: 1rem;
            background: linear-gradient(135deg, var(--room-primary), #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .actions button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--room-primary-glow);
        }

        .btn.secondary {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--room-border);
            border-radius: 12px;
            color: var(--room-text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ==================== FINALE OVERLAY ==================== */
        .finale-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.3), rgba(0, 0, 0, 0.9));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            animation: finaleIn 1s ease;
        }

        @keyframes finaleIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .finale-door {
            font-size: 6rem;
            animation: doorOpen 1.5s ease;
        }

        @keyframes doorOpen {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .finale-light {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.5), transparent);
            border-radius: 50%;
            animation: lightPulse 2s ease-in-out infinite;
        }

        @keyframes lightPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        .finale-character {
            font-size: 4rem;
            margin-top: 1rem;
            animation: characterWalk 1s ease forwards;
        }

        @keyframes characterWalk {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .finale-text {
            margin-top: 2rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            background: linear-gradient(135deg, var(--room-success), #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { filter: drop-shadow(0 0 10px var(--room-success-glow)); }
            50% { filter: drop-shadow(0 0 30px var(--room-success-glow)); }
        }

        .finale-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .finale-stats span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--room-success);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .room-hud {
                flex-direction: column;
                text-align: center;
            }

            .room-hud h1 {
                font-size: 1.2rem;
                justify-content: center;
            }

            .hud-stats {
                justify-content: center;
            }

            .simple-scene {
                min-height: 400px;
            }

            .scene-bag-panel {
                width: 100%;
                right: 0;
                border-radius: 20px 20px 0 0;
            }

            .simple-target {
                padding: 0.8rem;
                min-width: 100px;
            }

            .simple-target-icon img {
                width: 40px;
                height: 40px;
            }

            .finale-text {
                font-size: 1.3rem;
                padding: 0 1rem;
            }

            .finale-stats {
                flex-direction: column;
                gap: 0.8rem;
            }
        }

        /* ==================== HIDDEN FORM ==================== */
        .hidden-form {
            display: none;
        }
    </style>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- ==================== ROOM HUD ==================== -->
    <div class="room-hud">
        <div class="room-hud-info">
            <h1>
                <i class="fas fa-dungeon"></i>
                <span th:text="${room.name}">Tên phòng</span>
            </h1>
            <p>
                <i class="fas fa-info-circle"></i>
                <span th:text="${room.description}">Mô tả phòng</span>
            </p>
        </div>
        <div class="hud-stats">
            <div class="hud-stat step">
                <i class="fas fa-shoe-prints"></i>
                <span>Bước: <strong th:text="${progress.currentStep}">1</strong></span>
            </div>
            <div class="hud-stat score">
                <i class="fas fa-coins"></i>
                <span>Điểm: <strong th:text="${progress.score}">0</strong></span>
            </div>
            <div class="hud-stat wrong">
                <i class="fas fa-heart-crack"></i>
                <span>Sai: <strong th:text="${progress.wrongAttempts + '/' + maxWrongAttempts}">0/3</strong></span>
            </div>
        </div>
    </div>

    <!-- ==================== GAME SCENE ==================== -->
    <section class="simple-scene-wrap">
        <div class="simple-scene"
             th:classappend="${#strings.contains(room.name, 'Cổ Vật') ? ' scene-bg-history1' : (#strings.contains(room.name, 'Mật Mã') ? ' scene-bg-history2 scene-mystic' : (#strings.contains(room.name, 'Thí Nghiệm') ? ' scene-bg-science1' : (#strings.contains(room.name, 'Cơ Khí') ? ' scene-bg-science2' : '')))}"
             th:attr="data-success=${roomSuccess},data-error=${roomError}">

            <!-- Scene Topbar -->
            <div class="scene-topbar">
                <a class="scene-icon-btn" th:href="@{/}" title="Trang chủ">
                    <i class="fas fa-home"></i>
                </a>
                <button type="button" class="scene-icon-btn" id="scene-sound-toggle" title="Âm thanh">
                    <i class="fas fa-volume-high"></i>
                </button>
                <button type="button" class="scene-icon-btn" id="scene-music-toggle" title="Nhạc nền">
                    <i class="fas fa-music"></i>
                </button>
            </div>

            <!-- Feedback -->
            <div class="scene-feedback" id="scene-feedback" aria-live="polite"></div>

            <!-- Mystic Nodes -->
            <div class="mystic-nodes" th:if="${#strings.contains(room.name, 'Mật Mã')}">
                <span class="mystic-node node-a"></span>
                <span class="mystic-node node-b"></span>
                <span class="mystic-node node-c"></span>
                <span class="mystic-node node-d"></span>
            </div>

            <!-- Lab Cabinet -->
            <img th:if="${#strings.contains(room.name, 'Thí Nghiệm')}"
                 src="/images/objects/wall-cabinet.svg"
                 alt="Tủ treo tường phòng thí nghiệm"
                 class="lab-wall-cabinet">

            <!-- Inventory Button -->
            <button type="button" class="scene-inventory" id="scene-bag-toggle" title="Mở túi đồ">
                <span class="scene-inventory-icon"><i class="fas fa-suitcase"></i></span>
                <span class="scene-inventory-count" th:text="${#lists.size(inventoryItems)}">0</span>
            </button>

            <!-- Bag Panel -->
            <section class="scene-bag-panel game-modal" id="scene-bag-panel" hidden>
                <div class="scene-bag-header">
                    <h3>Túi đồ</h3>
                    <button type="button" class="scene-bag-close" id="scene-bag-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="inventory-grid direct-craft-grid" id="direct-craft-grid">
                    <button th:each="item : ${inventoryItems}"
                            type="button"
                            class="inventory-item-chip play-sfx-click collected draggable-item"
                            th:attr="data-item-key=${item.key},data-item-name=${item.name},data-item-collected=true,draggable=true">
                        <img th:if="${#strings.startsWith(item.icon, '/')}" class="inventory-icon-image" th:src="${item.icon}" th:alt="${item.name}">
                        <span th:if="${!#strings.startsWith(item.icon, '/')}" class="inventory-icon" th:text="${item.icon}"></span>
                        <span class="inventory-item-label" th:text="${item.name}"></span>
                    </button>
                    <div class="bag-empty" th:if="${#lists.isEmpty(inventoryItems)}">Chưa có vật phẩm</div>
                </div>

                <form id="combine-form"
                      th:action="@{'/game/rooms/' + ${room.id} + '/combine'}"
                      th:attr="data-ajax-action=@{'/game/rooms/' + ${room.id} + '/combine-ajax'}"
                      method="post"
                      class="hidden-form">
                    <input type="hidden" name="firstItem" id="combine-first-item">
                    <input type="hidden" name="secondItem" id="combine-second-item">
                </form>
            </section>

            <section class="lathe-combine-panel game-modal" id="lathe-combine-panel" hidden>
                <div class="lathe-panel-head">
                    <h3><i class="fas fa-gears"></i> Máy tiện kết hợp</h3>
                    <button type="button" class="scene-bag-close" id="lathe-panel-close" aria-label="Đóng máy tiện">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="lathe-panel-body">
                    <div class="lathe-pool" id="lathe-item-pool"></div>
                    <div class="lathe-combine-slots">
                        <div class="lathe-slot" id="lathe-slot-a" data-slot="first">
                            <small>Thả vật phẩm 1</small>
                            <strong>Trống</strong>
                        </div>
                        <div class="lathe-slot" id="lathe-slot-b" data-slot="second">
                            <small>Thả vật phẩm 2</small>
                            <strong>Trống</strong>
                        </div>
                    </div>
                    <div class="lathe-actions">
                        <button type="button" class="lathe-combine-btn" id="lathe-combine-btn" disabled>Kết hợp ngay</button>
                        <button type="button" class="lathe-clear-btn" id="lathe-clear-btn">Xóa chọn</button>
                    </div>
                </div>
            </section>

            <!-- Collectible Spots -->
            <form th:each="spot : ${collectibleSpots}"
                  th:if="${!spot.collected}"
                  th:action="@{'/game/rooms/' + ${room.id} + '/collect'}"
                  th:attr="data-ajax-action=@{'/game/rooms/' + ${room.id} + '/collect-ajax'},data-item-name=${spot.keyName}"
                  method="post"
                  class="scene-collect-spot"
                  th:style="${'left:' + spot.x + '%; top:' + spot.y + '%;'}">
                <input type="hidden" name="itemKey" th:value="${spot.key}">
                <div class="cabinet-container" th:attr="data-key-name=${spot.keyName}">
                    <div class="cabinet-interior">
                        <button type="submit" class="hidden-key-btn play-sfx-click" th:title="${'Nhặt chìa khóa: ' + spot.keyName}">
                            <img th:if="${spot.imageUrl != null and !#strings.isEmpty(spot.imageUrl)}"
                                 th:src="${spot.imageUrl}"
                                 th:alt="${spot.keyName}"
                                 class="collect-spot-image">
                            <span th:if="${spot.imageUrl == null or #strings.isEmpty(spot.imageUrl)}">
                                <i class="fas fa-key"></i>
                            </span>
                        </button>
                    </div>
                    <button type="button" class="cabinet-door" th:title="${'Tủ chứa: ' + spot.keyName}" aria-label="Tủ đóng">
                        <i class="fas fa-box"></i>
                    </button>
                </div>
            </form>

            <!-- Player -->
            <div class="simple-scene-player" aria-hidden="true">
                <i class="fas fa-user-secret"></i>
            </div>
            <div class="simple-scene-player-name" th:text="${playerName}">Player</div>

            <!-- Hotspots -->
            <div class="simple-hotspot"
                 th:each="obj, objStat : ${objects}"
                 th:classappend="${(obj.hotspotX == null or obj.hotspotY == null) ? (objStat.index == 0 ? ' pos-1' : (objStat.index == 1 ? ' pos-2' : (objStat.index == 2 ? ' pos-3' : (objStat.index == 3 ? ' pos-4' : (objStat.index == 4 ? ' pos-5' : ' pos-6'))))) : ''}"
                 th:style="${(obj.hotspotX != null and obj.hotspotY != null) ? 'left:' + obj.hotspotX + '%; top:' + obj.hotspotY + '%;' : ''}">

                <!-- Active QUIZ Object -->
                <a th:if="${!progress.completed and obj.requiredStep == progress.currentStep and obj.lockType.name() == 'QUIZ'}"
                   class="simple-target ready"
                   th:attr="data-hint=${obj.hint}"
                   th:href="@{'/game/rooms/' + ${room.id} + '?quizObjectId=' + ${obj.id}}">
                    <div class="target-arrow" aria-hidden="true">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="simple-target-icon scene-object-visual" th:switch="${obj.objectName}">
                        <img th:case="'Tủ gỗ khóa mã 3 số'" src="/images/objects/cabinet-lock.svg" alt="Tủ khóa mã">
                        <img th:case="'Kính hiển vi'" src="/images/objects/microscope-station.svg" alt="Kính hiển vi">
                        <img th:case="'Máy quét cạnh cửa'" src="/images/objects/scanner-terminal.svg" alt="Máy quét">
                        <img th:case="'Bảng nhập hình dạng vi khuẩn'" src="/images/objects/shape-console.svg" alt="Bảng nhập hình">
                        <img th:case="'Cửa thoát hiểm'" src="/images/objects/exit-door.svg" alt="Cửa thoát">
                        <span th:case="*"><i class="fas fa-puzzle-piece"></i></span>
                    </div>
                    <strong th:text="${obj.objectName}"></strong>
                    <span class="simple-target-sub" th:text="${obj.requiredStep == 1 ? 'Nhập mã mở tủ' : 'Chọn hình dạng đúng'}"></span>
                </a>

                <!-- Active INTERACTION Object -->
                <form th:if="${!progress.completed and obj.requiredStep == progress.currentStep and obj.lockType.name() == 'INTERACTION'}"
                      th:action="@{'/game/rooms/' + ${room.id} + '/objects/' + ${obj.id} + '/interact'}"
                      method="post" class="scene-object-form">
                    <button type="submit" class="simple-target ready" th:attr="data-hint=${obj.hint},data-object-name=${obj.objectName}">
                        <div class="target-arrow" aria-hidden="true">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="simple-target-icon scene-object-visual" th:switch="${obj.objectName}">
                            <img th:case="'Tủ gỗ khóa mã 3 số'" src="/images/objects/cabinet-lock.svg" alt="Tủ khóa mã">
                            <img th:case="'Kính hiển vi'" src="/images/objects/microscope-station.svg" alt="Kính hiển vi">
                            <img th:case="'Máy quét cạnh cửa'" src="/images/objects/scanner-terminal.svg" alt="Máy quét">
                            <img th:case="'Bảng nhập hình dạng vi khuẩn'" src="/images/objects/shape-console.svg" alt="Bảng nhập hình">
                            <img th:case="'Cửa thoát hiểm'" src="/images/objects/exit-door.svg" alt="Cửa thoát">
                            <span th:case="*"><i class="fas fa-key"></i></span>
                        </div>
                        <strong th:text="${obj.objectName}"></strong>
                        <span class="simple-target-sub" th:text="${obj.requiredStep == 2 ? 'Lắp kính + mẫu vật' : 'Đổ dung dịch tím vào máy quét'}"></span>
                    </button>
                </form>

                <!-- Completed Object -->
                <div th:if="${obj.requiredStep < progress.currentStep}" class="object-state-badge done" th:title="${obj.objectName}">
                    <i class="fas fa-check"></i>
                </div>

                <!-- Locked Object -->
                <div th:if="${obj.requiredStep > progress.currentStep or progress.completed}" class="object-state-badge locked" th:title="${obj.objectName}">
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <!-- Quiz Overlay -->
            <div id="scene-quiz-overlay" class="scene-quiz-overlay game-modal modal-overlay" th:if="${inlineQuestion != null}">
                <section class="scene-quiz-card input-panel">
                    <div class="inline-quiz-head">
                        <h2>Trắc nghiệm thoát hiểm</h2>
                        <a class="btn secondary" th:href="@{'/game/rooms/' + ${room.id}}">
                            <i class="fas fa-times"></i> Đóng
                        </a>
                    </div>

                    <h3 class="quiz-title" th:text="${inlineQuestion.questionText}">Câu hỏi</h3>
                    
                    <form th:action="@{'/game/rooms/' + ${room.id} + '/objects/' + ${inlineQuestionObjectId} + '/quiz'}"
                          th:object="${answerForm}"
                          method="post"
                          class="quiz-grid decode-form">
                        
                        <!-- Code Input -->
                        <div class="field" th:if="${inlineQuestion.answerCode != null and !#strings.isEmpty(inlineQuestion.answerCode)}">
                            <label>
                                <i class="fas fa-keyboard"></i>
                                Nhập mã
                            </label>
                            <input type="text" th:field="*{answerCode}" placeholder="Nhập mã 3 số" maxlength="40" autocomplete="off">
                        </div>

                        <!-- Multiple Choice -->
                        <div class="quiz-grid" th:if="${inlineQuestion.answerCode == null or #strings.isEmpty(inlineQuestion.answerCode)}">
                            <label class="quiz-option">
                                <input type="radio" th:field="*{selectedOption}" value="A">
                                <span>A. <span th:text="${inlineQuestion.optionA}"></span></span>
                            </label>
                            <label class="quiz-option">
                                <input type="radio" th:field="*{selectedOption}" value="B">
                                <span>B. <span th:text="${inlineQuestion.optionB}"></span></span>
                            </label>
                            <label class="quiz-option">
                                <input type="radio" th:field="*{selectedOption}" value="C">
                                <span>C. <span th:text="${inlineQuestion.optionC}"></span></span>
                            </label>
                            <label class="quiz-option">
                                <input type="radio" th:field="*{selectedOption}" value="D">
                                <span>D. <span th:text="${inlineQuestion.optionD}"></span></span>
                            </label>
                        </div>

                        <div class="actions">
                            <button type="submit" class="play-sfx-ok">
                                <i class="fas fa-check"></i>
                                <span th:text="${inlineQuestion.answerCode != null and !#strings.isEmpty(inlineQuestion.answerCode) ? 'Nhập mã mở tủ' : 'Xác nhận đáp án'}"></span>
                            </button>
                        </div>
                    </form>
                </section>
            </div>

            <!-- Finale Overlay -->
            <div class="finale-overlay" th:if="${progress.completed and progress.won}">
                <div class="finale-light"></div>
                <div class="finale-door">
                    <i class="fas fa-door-open"></i>
                </div>
                <div class="finale-character">
                    <i class="fas fa-person-running"></i>
                </div>
                <div class="finale-text">
                    <i class="fas fa-trophy"></i>
                    Cửa mở! Bạn đã thoát thành công!
                </div>
                <div class="finale-stats">
                    <span>
                        <i class="fas fa-mouse-pointer"></i>
                        <span th:text="${'Số click: ' + actionCount}">Số click: 0</span>
                    </span>
                    <span>
                        <i class="fas fa-stopwatch"></i>
                        <span th:text="${'Thời gian: ' + elapsedSeconds + ' giây'}">Thời gian: 0 giây</span>
                    </span>
                </div>
            </div>
        </div>
    </section>

    <script th:src="@{/vendor/three.min.js(v='20260321-1')}" src="/vendor/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        (function () {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            const audioContext = AudioCtx ? new AudioCtx() : null;

            const scene = document.querySelector('.simple-scene');
            const bagToggleButton = document.getElementById('scene-bag-toggle');
            const bagPanel = document.getElementById('scene-bag-panel');
            const quizOverlay = document.getElementById('scene-quiz-overlay');
            const bagCloseButton = document.getElementById('scene-bag-close');
            const soundToggleButton = document.getElementById('scene-sound-toggle');
            const musicToggleButton = document.getElementById('scene-music-toggle');

            if (localStorage.getItem('game.sfx.enabled') === null) {
                localStorage.setItem('game.sfx.enabled', 'false');
            }
            let isSfxEnabled = localStorage.getItem('game.sfx.enabled') === 'true';
            let isMusicEnabled = localStorage.getItem('game.music.enabled') === 'true';
            let musicOscillator = null;
            let musicGainNode = null;

            let feedbackQueue = [];
            let feedbackShowing = false;
            const toastHost = document.createElement('div');
            toastHost.className = 'game-toast-host';
            document.body.appendChild(toastHost);

            function syncAudioButtons() {
                if (soundToggleButton) {
                    const icon = soundToggleButton.querySelector('i');
                    if (icon) {
                        icon.className = isSfxEnabled ? 'fas fa-volume-high' : 'fas fa-volume-xmark';
                    }
                    soundToggleButton.title = isSfxEnabled ? 'Tắt âm thanh' : 'Bật âm thanh';
                }
                if (musicToggleButton) {
                    const icon = musicToggleButton.querySelector('i');
                    if (icon) {
                        icon.className = isMusicEnabled ? 'fas fa-music' : 'fas fa-music-slash';
                    }
                    musicToggleButton.title = isMusicEnabled ? 'Tắt nhạc nền' : 'Bật nhạc nền';
                }
            }

            async function ensureAudioReady() {
                if (!audioContext) {
                    return false;
                }
                if (audioContext.state === 'suspended') {
                    try {
                        await audioContext.resume();
                    } catch (error) {
                        return false;
                    }
                }
                return true;
            }

            function startBackgroundMusic() {
                if (!audioContext || musicOscillator || !isMusicEnabled) {
                    return;
                }
                musicOscillator = audioContext.createOscillator();
                musicGainNode = audioContext.createGain();
                musicOscillator.type = 'triangle';
                musicOscillator.frequency.value = 196;
                musicGainNode.gain.value = 0.015;
                musicOscillator.connect(musicGainNode);
                musicGainNode.connect(audioContext.destination);
                musicOscillator.start();
            }

            function stopBackgroundMusic() {
                if (musicOscillator) {
                    musicOscillator.stop();
                    musicOscillator.disconnect();
                    musicOscillator = null;
                }
                if (musicGainNode) {
                    musicGainNode.disconnect();
                    musicGainNode = null;
                }
            }

            function playTone(frequency, durationMs, type) {
                if (!audioContext || !isSfxEnabled) {
                    return;
                }
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                oscillator.type = type || 'sine';
                oscillator.frequency.value = frequency;
                gain.gain.value = 0.08;
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + durationMs / 1000);
            }

            function playErrorSound() {
                playTone(260, 120, 'sawtooth');
                setTimeout(() => playTone(210, 130, 'sawtooth'), 90);
            }

            function showSceneFeedback(message, isError) {
                if (!message) {
                    feedbackShowing = false;
                    return;
                }

                const toast = document.createElement('div');
                toast.className = 'game-toast ' + (isError ? 'error' : 'success');
                const icon = document.createElement('span');
                icon.className = 'game-toast-icon';
                icon.textContent = isError ? '⚠' : '✔';
                const content = document.createElement('span');
                content.textContent = message;
                toast.appendChild(icon);
                toast.appendChild(content);
                toastHost.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });

                if (isError) {
                    playErrorSound();
                } else {
                    playTone(680, 90, 'triangle');
                    setTimeout(() => playTone(820, 140, 'triangle'), 80);
                }

                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => {
                        toast.remove();
                    }, 220);
                    feedbackShowing = false;
                    flushFeedbackQueue();
                }, 1350);
            }

            function enqueueFeedback(message, isError) {
                if (!message) {
                    return;
                }
                feedbackQueue.push({message, isError: !!isError});
                if (feedbackQueue.length > 6) {
                    feedbackQueue = feedbackQueue.slice(-6);
                }
                flushFeedbackQueue();
            }

            function flushFeedbackQueue() {
                if (feedbackShowing || feedbackQueue.length === 0) {
                    return;
                }
                feedbackShowing = true;
                const next = feedbackQueue.shift();
                showSceneFeedback(next.message, next.isError);
            }

            function hideModal(modal) {
                if (!modal) {
                    return;
                }
                modal.hidden = true;
                modal.style.display = 'none';
            }

            function showModal(modal) {
                if (!modal) {
                    return;
                }
                modal.hidden = false;
                modal.style.display = '';
            }

            function closeAllGameModals(exceptId) {
                document.querySelectorAll('.game-modal').forEach((modal) => {
                    if (exceptId && modal.id === exceptId) {
                        showModal(modal);
                    } else {
                        hideModal(modal);
                    }
                });
            }

            function isAnyGameModalOpen() {
                return Array.from(document.querySelectorAll('.game-modal')).some((modal) => !modal.hidden && modal.style.display !== 'none');
            }

            window.showObjectDetail = function (objectId) {
                closeAllGameModals(objectId);
            };

            syncAudioButtons();

            if (soundToggleButton) {
                soundToggleButton.addEventListener('click', async () => {
                    await ensureAudioReady();
                    isSfxEnabled = !isSfxEnabled;
                    localStorage.setItem('game.sfx.enabled', String(isSfxEnabled));
                    syncAudioButtons();
                    enqueueFeedback(isSfxEnabled ? 'Đã bật âm thanh hiệu ứng.' : 'Đã tắt âm thanh hiệu ứng.', false);
                });
            }

            if (musicToggleButton) {
                musicToggleButton.addEventListener('click', async () => {
                    const ready = await ensureAudioReady();
                    if (!ready && audioContext) {
                        enqueueFeedback('Trình duyệt chưa cho phép phát âm thanh.', true);
                        return;
                    }
                    isMusicEnabled = !isMusicEnabled;
                    localStorage.setItem('game.music.enabled', String(isMusicEnabled));
                    if (isMusicEnabled) {
                        startBackgroundMusic();
                        enqueueFeedback('Đã bật nhạc nền.', false);
                    } else {
                        stopBackgroundMusic();
                        enqueueFeedback('Đã tắt nhạc nền.', false);
                    }
                    syncAudioButtons();
                });
            }

            if (isMusicEnabled) {
                ensureAudioReady().then((ready) => {
                    if (ready) {
                        startBackgroundMusic();
                    }
                });
            }

            if (scene) {
                const successMessage = scene.dataset.success;
                const errorMessage = scene.dataset.error;
                if (successMessage) {
                    enqueueFeedback(successMessage, false);
                }
                if (errorMessage) {
                    enqueueFeedback(errorMessage, true);
                }
            }

            function closeBagPanel() {
                closeAllGameModals();
            }

            function openBagPanel() {
                if (!bagPanel) {
                    return;
                }
                if (document.pointerLockElement) {
                    document.exitPointerLock();
                }
                showObjectDetail('scene-bag-panel');
            }

            if (bagToggleButton && bagPanel) {
                bagToggleButton.addEventListener('click', () => {
                    if (bagPanel.hidden || bagPanel.style.display === 'none') {
                        openBagPanel();
                    } else {
                        closeBagPanel();
                    }
                });
            }

            if (quizOverlay) {
                showObjectDetail('scene-quiz-overlay');
            }

            if (bagCloseButton) {
                bagCloseButton.addEventListener('click', closeBagPanel);
            }

            document.querySelectorAll('.play-sfx-click').forEach((element) => {
                element.addEventListener('click', async () => {
                    await ensureAudioReady();
                    playTone(520, 100, 'triangle');
                });
            });

            document.querySelectorAll('.play-sfx-ok').forEach((element) => {
                element.addEventListener('click', async () => {
                    await ensureAudioReady();
                    playTone(620, 90, 'triangle');
                    setTimeout(() => playTone(740, 120, 'triangle'), 80);
                });
            });

            const inventoryContainer = document.getElementById('direct-craft-grid');
            const combineForm = document.getElementById('combine-form');
            const combineAjaxAction = combineForm ? combineForm.dataset.ajaxAction : '';
            const combineFirstItemInput = document.getElementById('combine-first-item');
            const combineSecondItemInput = document.getElementById('combine-second-item');
            const scannerTarget = document.querySelector(".scene-object-form .simple-target[data-object-name='Máy quét cạnh cửa']");
            const lathePanel = document.getElementById('lathe-combine-panel');
            const latheCloseButton = document.getElementById('lathe-panel-close');
            const lathePool = document.getElementById('lathe-item-pool');
            const latheSlotA = document.getElementById('lathe-slot-a');
            const latheSlotB = document.getElementById('lathe-slot-b');
            const latheCombineButton = document.getElementById('lathe-combine-btn');
            const latheClearButton = document.getElementById('lathe-clear-btn');

            let selectedCollectedItem = null;
            let latheFirstItem = null;
            let latheSecondItem = null;
            let persistFpsState = null;

            function refreshScannerAttention() {
                if (!scannerTarget) {
                    return;
                }
                const shouldWiggle = selectedCollectedItem === 'purple_mix';
                scannerTarget.classList.toggle('scanner-ready', shouldWiggle);
                if (shouldWiggle) {
                    enqueueFeedback('Máy quét đang phản hồi với dung dịch tím!', false);
                }
            }

            function clearSelectedItem() {
                selectedCollectedItem = null;
                document.querySelectorAll('.inventory-item-chip.selected').forEach((node) => node.classList.remove('selected'));
                refreshScannerAttention();
            }

            function syncInventoryFromServer(items) {
                if (!inventoryContainer || !Array.isArray(items)) {
                    return;
                }

                inventoryContainer.innerHTML = '';
                if (items.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'bag-empty';
                    empty.textContent = 'Chưa có vật phẩm';
                    inventoryContainer.appendChild(empty);
                    return;
                }

                items.forEach((item) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'inventory-item-chip play-sfx-click collected draggable-item';
                    button.setAttribute('draggable', 'true');
                    button.dataset.itemKey = item.key;
                    button.dataset.itemName = item.name || item.key;
                    button.dataset.itemCollected = 'true';

                    if (item.icon && item.icon.startsWith('/')) {
                        const imageNode = document.createElement('img');
                        imageNode.className = 'inventory-icon-image';
                        imageNode.src = item.icon;
                        imageNode.alt = item.name || item.key;
                        button.appendChild(imageNode);
                    } else {
                        const iconNode = document.createElement('span');
                        iconNode.className = 'inventory-icon';
                        iconNode.textContent = item.icon || '🧩';
                        button.appendChild(iconNode);
                    }

                    const labelNode = document.createElement('span');
                    labelNode.className = 'inventory-item-label';
                    labelNode.textContent = item.name || item.key;
                    button.appendChild(labelNode);

                    inventoryContainer.appendChild(button);
                    attachInventoryButtonInteractions(button);
                });
            }

            async function submitCombine(firstItem, secondItem) {
                if (typeof persistFpsState === 'function') {
                    persistFpsState();
                }

                function fallbackSubmit() {
                    combineFirstItemInput.value = firstItem;
                    combineSecondItemInput.value = secondItem;
                    combineForm.submit();
                }

                if (!combineAjaxAction) {
                    fallbackSubmit();
                    return;
                }

                const formData = new FormData();
                formData.append('firstItem', firstItem);
                formData.append('secondItem', secondItem);

                try {
                    const response = await fetch(combineAjaxAction, {
                        method: 'POST',
                        body: formData,
                        credentials: 'same-origin'
                    });
                    if (response.status === 404 || response.status === 405) {
                        fallbackSubmit();
                        return;
                    }

                    const contentType = (response.headers.get('content-type') || '').toLowerCase();
                    if (!contentType.includes('application/json')) {
                        fallbackSubmit();
                        return;
                    }

                    const payload = await response.json();

                    if (!response.ok || !payload.success) {
                        enqueueFeedback(payload.message || 'Không thể kết hợp vật phẩm lúc này.', true);
                        return;
                    }

                    if (payload.inventoryItems) {
                        syncInventoryFromServer(payload.inventoryItems);
                    }

                    const countBadge = document.querySelector('.scene-inventory-count');
                    if (countBadge && payload.inventoryCount !== undefined) {
                        countBadge.textContent = String(payload.inventoryCount);
                    }
