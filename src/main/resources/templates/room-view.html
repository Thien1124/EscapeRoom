            function getInventoryItemMeta(itemKey) {
                if (!inventoryContainer) {
                    return null;
                }
                const itemNode = inventoryContainer.querySelector('[data-item-key="' + itemKey + '"]');
                if (!itemNode) {
                    return null;
                }
                const imageNode = itemNode.querySelector('img.inventory-icon-image');
                const iconNode = itemNode.querySelector('.inventory-icon');
                return {
                    key: itemNode.dataset.itemKey,
                    name: itemNode.dataset.itemName || itemNode.dataset.itemKey,
                    image: imageNode ? imageNode.getAttribute('src') : null,
                    emoji: iconNode ? iconNode.textContent : null
                };
            }

            function getInventoryMetas() {
                if (!inventoryContainer) {
                    return [];
                }
                return Array.from(inventoryContainer.querySelectorAll('.inventory-item-chip[data-item-collected="true"]'))
                    .map((node) => {
                        const imageNode = node.querySelector('img.inventory-icon-image');
                        const iconNode = node.querySelector('.inventory-icon');
                        return {
                            key: node.dataset.itemKey,
                            name: node.dataset.itemName || node.dataset.itemKey,
                            image: imageNode ? imageNode.getAttribute('src') : null,
                            emoji: iconNode ? iconNode.textContent : null
                        };
                    })
                    .filter((item) => !!item.key);
            }

            function renderLatheSlot(slotNode, itemMeta, placeholderText) {
                if (!slotNode) {
                    return;
                }
                slotNode.innerHTML = '';
                if (!itemMeta) {
                    const small = document.createElement('small');
                    small.textContent = placeholderText;
                    const strong = document.createElement('strong');
                    strong.textContent = 'Trống';
                    slotNode.appendChild(small);
                    slotNode.appendChild(strong);
                    return;
                }

                if (itemMeta.image) {
                    const img = document.createElement('img');
                    img.src = itemMeta.image;
                    img.alt = itemMeta.name;
                    slotNode.appendChild(img);
                } else {
                    const icon = document.createElement('div');
                    icon.textContent = itemMeta.emoji || '🧩';
                    slotNode.appendChild(icon);
                }

                const strong = document.createElement('strong');
                strong.textContent = itemMeta.name;
                slotNode.appendChild(strong);
            }

            function refreshLathePanelState() {
                const firstMeta = latheFirstItem ? getInventoryItemMeta(latheFirstItem) : null;
                const secondMeta = latheSecondItem ? getInventoryItemMeta(latheSecondItem) : null;
                renderLatheSlot(latheSlotA, firstMeta, 'Thả vật phẩm 1');
                renderLatheSlot(latheSlotB, secondMeta, 'Thả vật phẩm 2');

                if (latheCombineButton) {
                    latheCombineButton.disabled = !(latheFirstItem && latheSecondItem && latheFirstItem !== latheSecondItem);
                }
            }

            function assignLatheSlot(slotName, itemKey) {
                if (!itemKey) {
                    return;
                }
                if (slotName === 'first') {
                    latheFirstItem = itemKey;
                } else {
                    latheSecondItem = itemKey;
                }
                if (latheFirstItem && latheSecondItem && latheFirstItem === latheSecondItem) {
                    if (slotName === 'first') {
                        latheSecondItem = null;
                    } else {
                        latheFirstItem = null;
                    }
                }
                refreshLathePanelState();
            }

            function resetLatheSlots() {
                latheFirstItem = null;
                latheSecondItem = null;
                refreshLathePanelState();
            }

            function setupLatheSlotDnD(slotNode, slotName) {
                if (!slotNode) {
                    return;
                }
                slotNode.addEventListener('dragover', (event) => {
                    event.preventDefault();
                    slotNode.classList.add('drag-over');
                });
                slotNode.addEventListener('dragleave', () => {
                    slotNode.classList.remove('drag-over');
                });
                slotNode.addEventListener('drop', (event) => {
                    event.preventDefault();
                    slotNode.classList.remove('drag-over');
                    const droppedKey = event.dataTransfer.getData('application/x-item-key') || event.dataTransfer.getData('text/plain');
                    assignLatheSlot(slotName, droppedKey);
                });
            }

            function renderLatheItemPool() {
                if (!lathePool) {
                    return;
                }
                lathePool.innerHTML = '';
                const items = getInventoryMetas();
                if (items.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'lathe-empty-note';
                    empty.textContent = 'Chưa có vật phẩm để kết hợp.';
                    lathePool.appendChild(empty);
                    return;
                }

                items.forEach((item) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'lathe-pool-item';
                    button.draggable = true;
                    button.dataset.itemKey = item.key;

                    button.addEventListener('dragstart', (event) => {
                        if (document.pointerLockElement) {
                            document.exitPointerLock();
                        }
                        event.dataTransfer.setData('application/x-item-key', item.key);
                        event.dataTransfer.setData('text/plain', item.key);
                    });

                    button.addEventListener('click', () => {
                        if (!latheFirstItem) {
                            assignLatheSlot('first', item.key);
                            return;
                        }
                        if (!latheSecondItem) {
                            assignLatheSlot('second', item.key);
                            return;
                        }
                        assignLatheSlot('second', item.key);
                    });

                    if (item.image) {
                        const img = document.createElement('img');
                        img.src = item.image;
                        img.alt = item.name;
                        button.appendChild(img);
                    } else {
                        const icon = document.createElement('span');
                        icon.textContent = item.emoji || '🧩';
                        button.appendChild(icon);
                    }

                    const label = document.createElement('span');
                    label.textContent = item.name;
                    button.appendChild(label);
                    lathePool.appendChild(button);
                });
            }

            function openLathePanel() {
                if (!lathePanel) {
                    return;
                }
                if (document.pointerLockElement) {
                    document.exitPointerLock();
                }
                renderLatheItemPool();
                refreshLathePanelState();
                showObjectDetail('lathe-combine-panel');
            }

            function onInventoryItemClick(button) {
                const itemKey = button.dataset.itemKey;

                if (!selectedCollectedItem) {
                    selectedCollectedItem = itemKey;
                    button.classList.add('selected');
                    refreshScannerAttention();
                    return;
                }

                if (selectedCollectedItem === itemKey) {
                    clearSelectedItem();
                    return;
                }

                submitCombine(selectedCollectedItem, itemKey);
            }

            function attachInventoryButtonInteractions(button) {
                button.addEventListener('click', () => onInventoryItemClick(button));

                button.addEventListener('dragstart', (event) => {
                    if (button.dataset.itemCollected !== 'true') {
                        event.preventDefault();
                        return;
                    }
                    if (document.pointerLockElement) {
                        document.exitPointerLock();
                    }
                    const itemKey = button.dataset.itemKey || '';
                    event.dataTransfer.setData('application/x-item-key', itemKey);
                    event.dataTransfer.setData('text/plain', itemKey);
                });

                button.addEventListener('dragover', (event) => {
                    if (button.dataset.itemCollected === 'true') {
                        event.preventDefault();
                    }
                });

                button.addEventListener('drop', (event) => {
                    event.preventDefault();
                    if (button.dataset.itemCollected !== 'true') {
                        return;
                    }
                    const draggedKey = event.dataTransfer.getData('application/x-item-key') || event.dataTransfer.getData('text/plain');
                    const targetKey = button.dataset.itemKey;
                    if (!draggedKey || !targetKey || draggedKey === targetKey) {
                        return;
                    }
                    submitCombine(draggedKey, targetKey);
                });

            document.querySelectorAll('.scene-collect-spot').forEach((collectForm) => {
                collectForm.addEventListener('submit', async (event) => {
                    event.preventDefault();
                    const ajaxAction = collectForm.dataset.ajaxAction;
                    if (!ajaxAction) {
                        if (typeof persistFpsState === 'function') {
                            persistFpsState();
                        }
                        collectForm.submit();
                        return;
                    }

                    const formData = new FormData(collectForm);
                    try {
                        const response = await fetch(ajaxAction, {
                            method: 'POST',
                            body: formData,
                            credentials: 'same-origin'
                        });
                        const payload = await response.json();

                        if (!response.ok || !payload.success) {
                            enqueueFeedback(payload.message || 'Không thể nhặt vật phẩm lúc này.', true);
                            return;
                        }

                        collectForm.remove();
                        const countBadge = document.querySelector('.scene-inventory-count');
                        if (countBadge && payload.inventoryCount !== undefined) {
                            countBadge.textContent = String(payload.inventoryCount);
                        }

                        if (inventoryContainer && payload.itemKey) {
                            const emptyState = inventoryContainer.querySelector('.bag-empty');
                            if (emptyState) {
                                emptyState.remove();
                            }

                            const exists = inventoryContainer.querySelector(`[data-item-key="${payload.itemKey}"]`);
                            if (!exists) {
                                const newItemButton = document.createElement('button');
                                newItemButton.type = 'button';
                                newItemButton.className = 'inventory-item-chip play-sfx-click collected draggable-item newly-added';
                                newItemButton.setAttribute('draggable', 'true');
                                newItemButton.dataset.itemKey = payload.itemKey;
                                newItemButton.dataset.itemName = payload.itemName || payload.itemKey;
                                newItemButton.dataset.itemCollected = 'true';

                                let iconNode;
                                if (payload.itemIcon && payload.itemIcon.startsWith('/')) {
                                    iconNode = document.createElement('img');
                                    iconNode.className = 'inventory-icon-image';
                                    iconNode.src = payload.itemIcon;
                                    iconNode.alt = payload.itemName || payload.itemKey;
                                } else {
                                    iconNode = document.createElement('span');
                                    iconNode.className = 'inventory-icon';
                                    iconNode.textContent = payload.itemIcon || '🧩';
                                }

                                const textNode = document.createElement('span');
                                textNode.className = 'inventory-item-label';
                                textNode.textContent = payload.itemName || payload.itemKey;

                                newItemButton.appendChild(iconNode);
                                newItemButton.appendChild(textNode);
                                inventoryContainer.appendChild(newItemButton);
                                attachInventoryButtonInteractions(newItemButton);
                                renderLatheItemPool();
                                refreshLathePanelState();

                                setTimeout(() => {
                                    newItemButton.classList.remove('newly-added');
                                }, 1800);
                            }
                        }

                        enqueueFeedback(payload.message || 'Đã nhặt vật phẩm.', false);
                    } catch (error) {
                        enqueueFeedback('Kết nối gián đoạn, thử lại nhé.', true);
                    }
                });
            });

                // GLB Model Cache System
                const modelCache = {};
                const loadingPromises = {};

                function loadGLBModel(path) {
                    console.log('🔄 Loading GLB Model:', path);

                    if (modelCache[path]) {
                        console.log('✅ Using cached model:', path);
                        return Promise.resolve(modelCache[path].clone());
                    }

                    if (loadingPromises[path]) {
                        console.log('⏳ Model already loading:', path);
                        return loadingPromises[path].then(model => model.clone());
                    }

                    if (!gltfLoader) {
                        console.warn('❌ GLTFLoader not available for model:', path);
                        return Promise.reject(new Error('GLTFLoader not available'));
                    }

                    loadingPromises[path] = new Promise((resolve, reject) => {
                        console.log('📥 Starting GLTFLoader for:', path);
                        gltfLoader.load(
                            path,
                            (gltf) => {
                                console.log('✅ GLTFLoader success for:', path);
                                const model = gltf.scene;
                                modelCache[path] = model;
                                delete loadingPromises[path];

                                // Enable shadows for all meshes in model
                                model.traverse((child) => {
                                    if (child.isMesh) {
                                        child.castShadow = true;
                                        child.receiveShadow = true;
                                        // Enhance materials if needed
                                        if (child.material) {
                                            child.material.envMap = cubeRenderTarget.texture;
                                            child.material.envMapIntensity = 0.2;
                                            if (child.material.metalness > 0.5) {
                                                child.material.envMapIntensity = 0.7;
                                            }
                                        }
                                    }
                                });

                                console.log('✅ Loaded GLB model:', path);
                                resolve(model.clone());
                            },
                            (progress) => {
                                // Loading progress
                            },
                            (error) => {
                                console.error('❌ Failed to load GLB model:', path, error);
                                delete loadingPromises[path];
                                reject(error);
                            }
                        );
                    });

                    return loadingPromises[path];

                function prepareModelForScene(modelRoot, targetHeight, targetMaxDimension) {
                    const initialBox = new THREE.Box3().setFromObject(modelRoot);
                    const initialSize = new THREE.Vector3();
                    initialBox.getSize(initialSize);

                    const initialHorizontalMax = Math.max(initialSize.x, initialSize.z);
                    if (initialHorizontalMax > 0.001 && initialSize.y < initialHorizontalMax * 0.22) {
                        modelRoot.rotation.x = -Math.PI / 2;
                        modelRoot.updateMatrixWorld(true);
                    }

                    const box = new THREE.Box3().setFromObject(modelRoot);
                    if (!Number.isFinite(box.min.x) || !Number.isFinite(box.max.x)) {
                        return;
                    }

                    const size = new THREE.Vector3();
                    box.getSize(size);
                    if (size.y > 0.001 && Number.isFinite(targetHeight) && targetHeight > 0) {
                        const scale = targetHeight / size.y;
                        modelRoot.scale.setScalar(scale);
                    } else if (Number.isFinite(targetMaxDimension) && targetMaxDimension > 0) {
                        const currentMax = Math.max(size.x, size.y, size.z);
                        if (currentMax > 0.001) {
                            const scale = targetMaxDimension / currentMax;
                            modelRoot.scale.setScalar(scale);
                        }
                    }

                    const normalized = new THREE.Box3().setFromObject(modelRoot);
                    const center = new THREE.Vector3();
                    normalized.getCenter(center);
                    modelRoot.position.x -= center.x;
                    modelRoot.position.z -= center.z;

                    const adjusted = new THREE.Box3().setFromObject(modelRoot);
                    modelRoot.position.y -= adjusted.min.y;

                    modelRoot.traverse((node) => {
                        if (!node.isMesh) {
                            return;
                        }
                        node.castShadow = true;
                        node.receiveShadow = true;
                        if (node.material && node.material.map) {
                            node.material.map.colorSpace = THREE.SRGBColorSpace;
                            node.material.needsUpdate = true;
                        }
                    });
                }

                        }
                        return;
                    }
                    gltfLoader.load(
                        url,
                        (gltf) => {
                            const model = gltf.scene || (Array.isArray(gltf.scenes) ? gltf.scenes[0] : null);
                            if (!model) {
                                return;
                            }
                            onLoaded(model);
                        },
                        undefined,
                        () => {
                            if (!glbWarned) {
                                glbWarned = true;
                                enqueueFeedback('Có model 3D không tải được, dùng bản dự phòng.', true);
                            }
                        }
                    );
                }

                            positions[i * 3 + 2] += ancientVels[i].z;

                            if (positions[i * 3 + 1] > 4) {
                                positions[i * 3 + 1] = 0.5;

                        ancientParticles.geometry.attributes.position.needsUpdate = true;

                function createCollisionEntryForMesh(mesh, padding) {
                    const box = new THREE.Box3();
                    return {
                        mesh,
                        padding: padding || 0,
                        getBox() {
                            box.setFromObject(mesh);
                            return box;
                        }
                    };

                addRoomDecorations();

                function parseWorldPositionFromNode(node) {
                    const classPosMap = {
                        'pos-1': { left: 15, top: 60 },
                        'pos-2': { left: 35, top: 50 },
                        'pos-3': { left: 55, top: 55 },
                        'pos-4': { left: 75, top: 45 },
                        'pos-5': { left: 25, top: 70 },
                        'pos-6': { left: 65, top: 65 }
                    };

                    let fallback = null;
                    Object.keys(classPosMap).some((className) => {
                        if (node.classList && node.classList.contains(className)) {
                            fallback = classPosMap[className];
                            return true;
                        }
                        return false;
                    });

                    const leftRaw = node.style.left || (fallback ? String(fallback.left) : '50');
                    const topRaw = node.style.top || (fallback ? String(fallback.top) : '50');
                    const left = parseFloat(leftRaw);
                    const top = parseFloat(topRaw);
                    const safeLeft = Number.isFinite(left) ? left : 50;
                    const safeTop = Number.isFinite(top) ? top : 50;
                    const x = ((safeLeft / 100) - 0.5) * 17.5;
                    const z = ((safeTop / 100) - 0.5) * 15.5;
                    return { x, z };
                }

                document.querySelectorAll('.simple-hotspot .simple-target.ready').forEach((targetNode) => {
                    addSceneObjectInteractable(targetNode);
                });

                addLatheMachine();

                scene.classList.add('fps-mode');

                const keyState = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
                let yaw = 0;
                let pitch = 0;
                let pointerLocked = false;
                const walkSpeed = 5.2;
                const playerRadius = 0.36;

                function setMovementKeysActive(active) {
                    if (active) {
                        return;
                    }
                    keyState.KeyW = false;
                    keyState.KeyA = false;
                    keyState.KeyS = false;
                    keyState.KeyD = false;
                }

                function saveCurrentFpsState() {
                    if (!fpsStateKey) {
                        return;
                    }
                    const payload = {
                        x: camera.position.x,
                        z: camera.position.z,
                        yaw,
                        pitch,
                        ts: Date.now()
                    };
                    try {
                        sessionStorage.setItem(fpsStateKey, JSON.stringify(payload));
                    } catch (error) {
                        // Ignore storage failures on private/strict browser modes.
                    }
                }

                function restoreFpsState() {
                    if (!fpsStateKey) {
                        return;
                    }
                    let raw = null;
                    try {
                        raw = sessionStorage.getItem(fpsStateKey);
                    } catch (error) {
                        return;
                    }
                    if (!raw) {
                        return;
                    }

                    let parsed;
                    try {
                        parsed = JSON.parse(raw);
                    } catch (error) {
                        return;
                    }

                    const maxPitch = 0.55;
                    const safeX = Number.isFinite(parsed.x) ? parsed.x : camera.position.x;
                    const safeZ = Number.isFinite(parsed.z) ? parsed.z : camera.position.z;
                    const safeYaw = Number.isFinite(parsed.yaw) ? parsed.yaw : yaw;
                    const safePitch = Number.isFinite(parsed.pitch)
                        ? Math.max(-maxPitch, Math.min(maxPitch, parsed.pitch))
                        : pitch;

                    const clampPadding = 0.45;
                    camera.position.x = Math.max(-boundaryHalf + clampPadding, Math.min(boundaryHalf - clampPadding, safeX));
                    camera.position.z = Math.max(-boundaryHalf + clampPadding, Math.min(boundaryHalf - clampPadding, safeZ));
                    camera.position.y = 1.6;
                    yaw = safeYaw;
                    pitch = safePitch;
                }

                persistFpsState = saveCurrentFpsState;

                const raycaster = new THREE.Raycaster();
                const center = new THREE.Vector2(0, 0);
                const cameraEuler = new THREE.Euler(0, 0, 0, 'YXZ');

                function resizeRenderer() {
                    const width = scene.clientWidth;
                    const height = scene.clientHeight;
                    camera.aspect = width / Math.max(height, 1);
                    camera.updateProjectionMatrix();
                    renderer.setSize(width, height);
                }

                function toggleBagWithKey() {
                    if (!bagToggleButton || !bagPanel) {
                        return;
                    }
                    bagToggleButton.click();
                }

                function updateDynamicHint(text) {
                    if (!text) {
                        dynamicHint.classList.remove('show');
                        dynamicHint.textContent = '';
                        return;
                    }
                    dynamicHint.textContent = text;
                    dynamicHint.classList.add('show');
                }

                function isBlocked(nextX, nextZ) {
                    if (nextX < -boundaryHalf || nextX > boundaryHalf || nextZ < -boundaryHalf || nextZ > boundaryHalf) {
                        return true;
                    }

                    for (const entry of collisionEntries) {
                        const box = entry.getBox();
                        const pad = entry.padding;
                        const minX = box.min.x - pad;
                        const maxX = box.max.x + pad;
                        const minZ = box.min.z - pad;
                        const maxZ = box.max.z + pad;
                        if (nextX + playerRadius > minX && nextX - playerRadius < maxX && nextZ + playerRadius > minZ && nextZ - playerRadius < maxZ) {
                            return true;
                        }
                    }
                    return false;
                }

                function updateFocusedObject() {
                    raycaster.setFromCamera(center, camera);
                    const hits = raycaster.intersectObjects(interactableHits, false);
                    const nearest = hits.find((hit) => hit.distance <= 3.2);

                    if (focusedState) {
                        focusedState.setHighlighted(false);
                    }

                    focusedState = nearest ? nearest.object.userData.state : null;
                    if (!focusedState) {
                        updateDynamicHint('');
                        return;
                    }

                    focusedState.setHighlighted(true);

                    if (focusedState.kind === 'crate') {
                        updateDynamicHint(resolveCrateHint(focusedState));
                    } else if (focusedState.kind === 'lathe') {
                        updateDynamicHint('F: Mở máy tiện để kéo-thả kết hợp vật phẩm');
                    } else {
                        updateDynamicHint('F: Tương tác - ' + focusedState.label);
                    }
                }

                function removeWorldState(state) {
                    state.destroyed = true;

                    if (state.kind === 'crate') {
                        threeScene.remove(state.group);
                        const hitIndex = interactableHits.indexOf(state.hitMesh);
                        if (hitIndex >= 0) {
                            interactableHits.splice(hitIndex, 1);
                        }
                    } else if (state.kind === 'object') {
                        threeScene.remove(state.mesh);
                        const hitIndex = interactableHits.indexOf(state.hitMesh);
                        if (hitIndex >= 0) {
                            interactableHits.splice(hitIndex, 1);
                        }
                    } else if (state.kind === 'lathe') {
                        threeScene.remove(state.group);
                        const hitIndex = interactableHits.indexOf(state.hitMesh);
                        if (hitIndex >= 0) {
                            interactableHits.splice(hitIndex, 1);
                        }
                    }

                    for (let i = collisionEntries.length - 1; i >= 0; i -= 1) {
                        if (state.kind === 'crate' && collisionEntries[i].mesh === state.hitMesh) {
                            collisionEntries.splice(i, 1);
                        }
                        if (state.kind === 'object' && collisionEntries[i].mesh === state.mesh) {
                            collisionEntries.splice(i, 1);
                        }
                        if (state.kind === 'lathe' && collisionEntries[i].mesh === state.hitMesh) {
                            collisionEntries.splice(i, 1);
                        }
                    }

                    const stateIndex = worldStates.indexOf(state);
                    if (stateIndex >= 0) {
                        worldStates.splice(stateIndex, 1);
                    }
                }

                function interactFocusedObject() {
                    if (!focusedState) {
                        enqueueFeedback('Không có vật thể để tương tác.', true);
                        return;
                    }

                    if (focusedState.kind === 'crate') {
                        if (!focusedState.revealed) {
                            focusedState.revealed = true;
                            focusedState.revealTarget = 1;
                            if (focusedState.base) {
                                focusedState.base.visible = true;
                            }
                            if (focusedState.lid) {
                                focusedState.lid.visible = true;
                            }
                            enqueueFeedback('Bạn vừa phát hiện một hộp giấu trong tủ!', false);
                            return;
                        }

                        if (focusedState.lockType === 'key-lock' && !focusedState.unlocked) {
                            if (!hasUnlockKeyInInventory()) {
                                enqueueFeedback('Hộp này cần chìa khóa hoặc thẻ mở.', true);
                                return;
                            }
                            focusedState.unlocked = true;
                            enqueueFeedback('Bạn đã mở khóa hộp bằng chìa.', false);
                        }

                        if (focusedState.lockType === 'code-lock' && !focusedState.unlocked) {
                            const inputCode = window.prompt('Nhập mật khẩu 3 số để mở hộp:');
                            if (!inputCode) {
                                enqueueFeedback('Bạn chưa nhập mật khẩu.', true);
                                return;
                            }
                            if (String(inputCode).trim() !== focusedState.lockCode) {
                                enqueueFeedback('Sai mật khẩu. Gợi ý: quan sát kỹ môi trường.', true);
                                return;
                            }
                            focusedState.unlocked = true;
                            enqueueFeedback('Mật khẩu đúng, hộp đã được mở khóa.', false);
                        }

                        if (!focusedState.opened) {
                            focusedState.opened = true;
                            focusedState.targetOpen = 1;
                            enqueueFeedback('Đã mở nắp hộp. Nhấn F lần nữa để lấy vật phẩm.', false);
                            return;
                        }

                        const formNode = focusedState.formNode;
                        if (formNode && formNode.isConnected) {
                            formNode.requestSubmit();
                            setTimeout(() => {
                                if (!formNode.isConnected && !focusedState.destroyed) {
                                    removeWorldState(focusedState);
                                    focusedState = null;
                                    updateDynamicHint('');
                                }
                            }, 900);
                        }
                        return;
                    }

                    if (focusedState.kind === 'lathe') {
                        openLathePanel();
                        enqueueFeedback('Máy tiện mở: kéo vật phẩm vào 2 ô để kết hợp.', false);
                        return;
                    }

                    if (focusedState.actionNode) {
                        saveCurrentFpsState();
                        if (focusedState.isDoor) {
                            focusedState.targetOpen = 1;
                        }
                        focusedState.actionNode.click();
                    }
                }

                function drawMiniMap() {
                    if (!miniMapCtx) {
                        return;
                    }

                    const w = miniMapCanvas.width;
                    const h = miniMapCanvas.height;
                    miniMapCtx.clearRect(0, 0, w, h);
                    miniMapCtx.fillStyle = '#041225';
                    miniMapCtx.fillRect(0, 0, w, h);

                    const margin = 12;
                    const mapSize = w - margin * 2;
                    miniMapCtx.strokeStyle = 'rgba(56, 189, 248, 0.9)';
                    miniMapCtx.lineWidth = 1.5;
                    miniMapCtx.strokeRect(margin, margin, mapSize, mapSize);

                    function worldToMapX(x) {
                        return margin + ((x + 20) / 40) * mapSize;
                    }

                    function worldToMapY(z) {
                        return margin + ((z + 20) / 40) * mapSize;
                    }

                    for (const state of worldStates) {
                        if (state.destroyed) {
                            continue;
                        }
                        const ref = state.kind === 'crate'
                            ? state.group.position
                            : (state.kind === 'lathe' ? state.group.position : state.mesh.position);
                        miniMapCtx.beginPath();
                        miniMapCtx.fillStyle = state.kind === 'crate' ? (state.opened ? '#f59e0b' : '#dc2626') : '#38bdf8';
                        miniMapCtx.arc(worldToMapX(ref.x), worldToMapY(ref.z), 3.4, 0, Math.PI * 2);
                        miniMapCtx.fill();
                    }

                    const px = worldToMapX(camera.position.x);
                    const py = worldToMapY(camera.position.z);
                    miniMapCtx.beginPath();
                    miniMapCtx.fillStyle = '#10b981';
                    miniMapCtx.arc(px, py, 4.2, 0, Math.PI * 2);
                    miniMapCtx.fill();

                    const dx = Math.sin(yaw) * 10;
                    const dy = -Math.cos(yaw) * 10;
                    miniMapCtx.beginPath();
                    miniMapCtx.strokeStyle = '#86efac';
                    miniMapCtx.lineWidth = 2;
                    miniMapCtx.moveTo(px, py);
                    miniMapCtx.lineTo(px + dx, py + dy);
                    miniMapCtx.stroke();
                }

                function onMouseMove(event) {
                    if (!pointerLocked) {
                        return;
                    }

                    if (isAnyGameModalOpen()) {
                        return;
                    }

                    const sensitivity = 0.0018;
                    yaw -= event.movementX * sensitivity;
                    pitch -= event.movementY * sensitivity;

                    const maxPitch = 0.55;
                    if (pitch > maxPitch) {
                        pitch = maxPitch;
                    }
                    if (pitch < -maxPitch) {
                        pitch = -maxPitch;
                    }
                }

                function isTypingTarget(node) {
                    if (!node) {
                        return false;
                    }
                    const tag = node.tagName;
                    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || node.isContentEditable;
                }

                function onKeyDown(event) {
                    if (isTypingTarget(event.target)) {
                        return;
                    }
                    if (event.code === 'Tab') {
                        event.preventDefault();
                        document.body.classList.remove('fps-hud-hidden');
                        return;
                    }
                    if (event.code in keyState) {
                        if (!pointerLocked || isAnyGameModalOpen()) {
                            return;
                        }
                        keyState[event.code] = true;
                    }
                    if (event.code === 'KeyE') {
                        event.preventDefault();
                        if (document.pointerLockElement) {
                            document.exitPointerLock();
                        }
                        toggleBagWithKey();
                    }
                    if (event.code === 'KeyF') {
                        event.preventDefault();
                        interactFocusedObject();
                    }
                }

                function onKeyUp(event) {
                    if (event.code === 'Tab') {
                        event.preventDefault();
                        document.body.classList.add('fps-hud-hidden');
                        return;
                    }
                    if (event.code in keyState) {
                        keyState[event.code] = false;
                    }
                }

                wrap.addEventListener('click', async () => {
                    await ensureAudioReady();
                    if (isAnyGameModalOpen()) {
                        return;
                    }
                    if (document.pointerLockElement !== wrap) {
                        wrap.requestPointerLock();
                    }
                });

                document.addEventListener('pointerlockchange', () => {
                    pointerLocked = document.pointerLockElement === wrap;
                    if (pointerLocked) {
                        enqueueFeedback('FPS: chuột đổi góc nhìn, WASD di chuyển.', false);
                    } else {
                        setMovementKeysActive(false);
                        saveCurrentFpsState();
                    }
                });

                document.addEventListener('mousemove', onMouseMove);
                window.addEventListener('keydown', onKeyDown);
                window.addEventListener('keyup', onKeyUp);
                window.addEventListener('resize', resizeRenderer);
                window.addEventListener('beforeunload', saveCurrentFpsState);

                resizeRenderer();
                restoreFpsState();

                let last = performance.now();
                function render(now) {
                    const dt = Math.min((now - last) / 1000, 0.08);
                    last = now;

                    cameraEuler.y = yaw;
                    cameraEuler.x = pitch;
                    cameraEuler.z = 0;
                    camera.quaternion.setFromEuler(cameraEuler);

                    const lookVector = new THREE.Vector3();
                    camera.getWorldDirection(lookVector);
                    const moveForward = new THREE.Vector3(lookVector.x, 0, lookVector.z).normalize();
                    const moveRight = new THREE.Vector3()
                        .crossVectors(moveForward, new THREE.Vector3(0, 1, 0))
                        .normalize();

                    const velocity = new THREE.Vector3();
                    if (keyState.KeyW) {
                        velocity.add(moveForward);
                    }
                    if (keyState.KeyS) {
                        velocity.sub(moveForward);
                    }
                    if (keyState.KeyA) {
                        velocity.sub(moveRight);
                    }
                    if (keyState.KeyD) {
                        velocity.add(moveRight);
                    }

                    if (pointerLocked && !isAnyGameModalOpen() && velocity.lengthSq() > 0) {
                        velocity.normalize().multiplyScalar(walkSpeed * dt);

                        const tryX = camera.position.x + velocity.x;
                        if (!isBlocked(tryX, camera.position.z)) {
                            camera.position.x = tryX;
                        }

                        const tryZ = camera.position.z + velocity.z;
                        if (!isBlocked(camera.position.x, tryZ)) {
                            camera.position.z = tryZ;
                        }

                        camera.position.y = 1.6;
                    }

                    worldStates.forEach((state) => {
                        if (state.kind === 'crate' && !state.destroyed) {
                            const target = state.targetOpen;
                            const speed = 2.8;
                            const diff = target - state.openProgress;
                            if (Math.abs(diff) > 0.001) {
                                state.openProgress += Math.sign(diff) * Math.min(Math.abs(diff), dt * speed);
                            }

                            // Only animate lidPivot if it exists (fallback BoxGeometry mode)
                            if (state.lidPivot && state.lidPivot.rotation) {
                                state.lidPivot.rotation.x = -state.openProgress * (Math.PI * 0.75);
                            }

                            // Only animate cabinetDoorPivot if it exists (fallback BoxGeometry mode)
                            if (state.cabinetDoorPivot && state.cabinetDoorPivot.rotation) {
                                const revealDiff = state.revealTarget - state.revealProgress;
                                if (Math.abs(revealDiff) > 0.001) {
                                    state.revealProgress += Math.sign(revealDiff) * Math.min(Math.abs(revealDiff), dt * 2.1);
                                }
                                state.cabinetDoorPivot.rotation.y = -state.revealProgress * (Math.PI * 0.8);
                            }

                            // For GLB models, we can add custom animations here if needed
                            // TODO: Add GLB model-specific animations
                        }

                        if (state.kind === 'object' && state.isDoor && state.doorPivot && !state.destroyed) {
                            const target = state.targetOpen;
                            const speed = 2.4;
                            const diff = target - state.openProgress;
                            if (Math.abs(diff) > 0.001) {
                                state.openProgress += Math.sign(diff) * Math.min(Math.abs(diff), dt * speed);
                            }
                            state.doorPivot.rotation.y = -state.openProgress * (Math.PI * 0.6);
                        }
                    });

                    updateFocusedObject();

                    // Animate particles for all room types
                    if (threeScene.userData.animateParticles) {
                        threeScene.userData.animateParticles();
                    }
                    if (threeScene.userData.animateMysticalParticles) {
                        threeScene.userData.animateMysticalParticles();
                    }
                    if (threeScene.userData.animateAncientParticles) {
                        threeScene.userData.animateAncientParticles();
                    }

                    // drawMiniMap(); // Minimap disabled - using 3D view only

                    // Update environment map for dynamic reflections (less frequently for performance)
                    if (Math.random() < 0.1) { // Update only 10% of frames
                        cubeCamera.position.copy(camera.position);
                        cubeCamera.update(renderer, threeScene);
                    }

                    renderer.render(threeScene, camera);
                    requestAnimationFrame(render);
                }

                requestAnimationFrame(render);
                }

            if (window.THREE) {
                document.body.classList.add('fps-fullscreen');
                initThreeFpsMode();
            } else {
                enqueueFeedback('Không thể khởi tạo chế độ 3D/GLB.', true);
                if (scene) {
                    const fatal3d = document.createElement('div');
                    fatal3d.className = 'fps-hint-dynamic show';
                    fatal3d.style.top = '50%';
                    fatal3d.style.left = '50%';
                    fatal3d.style.transform = 'translate(-50%, -50%)';
                    fatal3d.style.zIndex = '200';
                    fatal3d.textContent = 'Trình duyệt chưa tải được Three.js hoặc GLTFLoader. Vui lòng tải lại trang.';
                    scene.appendChild(fatal3d);
                }
            }
        })();
    </script>
</section>
