<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống An Ninh - Đăng Ký</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cyan: #00e5ff;
            --cyan-dim: rgba(0, 229, 255, 0.35);
            --dark: #03080c;
        }

        body {
            background: var(--dark);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 229, 255, 0.012) 2px, rgba(0, 229, 255, 0.012) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        .topbar {
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid #0b1a24;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.4rem;
            color: var(--cyan);
            text-decoration: none;
            text-shadow: 0 0 10px var(--cyan-dim);
            letter-spacing: 2px;
        }

        .brand::before {
            content: '> ';
        }

        .topbar-nav a {
            color: #2a3a44;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .topbar-nav a:hover {
            color: var(--cyan);
            text-shadow: 0 0 5px var(--cyan-dim);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 1rem;
        }

        .vault {
            background: #020609;
            border: 1px solid #0b1a24;
            border-top: 2px solid var(--cyan);
            width: 100%;
            max-width: 460px;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.05);
        }

        .vault::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scan-v 3s linear infinite;
            top: 0;
            box-shadow: 0 0 10px var(--cyan);
        }

        @keyframes scan-v {
            0% {
                top: 0;
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            95% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .vault-title {
            color: var(--cyan);
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #0b1a24;
            text-shadow: 0 0 8px var(--cyan-dim);
        }

        .vault-title i {
            margin-right: 10px;
        }

        .notice {
            padding: 10px 12px;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
            border-left: 3px solid;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .notice.error {
            background: rgba(255, 0, 0, 0.07);
            border-color: #ff2200;
            color: #ff5533;
        }

        .notice::before {
            content: '>> ';
        }

        .field {
            margin-bottom: 1.3rem;
        }

        .field label {
            display: block;
            color: #2a4455;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #1a2d3a;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .input-wrap input {
            width: 100%;
            background: #010305;
            border: 1px solid #0b1a24;
            color: var(--cyan);
            padding: 11px 12px 11px 36px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-wrap input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
        }

        .input-wrap:focus-within i {
            color: var(--cyan);
        }

        .field small {
            display: block;
            color: #ff4422;
            font-size: 0.78rem;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: inherit;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 20px var(--cyan-dim);
        }

        .vault-footer {
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px dashed #0b1a24;
            text-align: center;
            font-size: 0.82rem;
            color: #1a2d3a;
        }

        .vault-footer a {
            color: #2a4455;
            text-decoration: none;
            transition: 0.3s;
        }

        .vault-footer a:hover {
            color: var(--cyan);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: #0b1a24;
            font-size: 0.8rem;
            border-top: 1px solid #060f15;
        }
    </style>
</head>

<body>
    <header class="topbar">
        <a class="brand" href="/">Quiz Escape Room</a>
        <nav class="topbar-nav">
            <a href="/">🏠 Trang Chủ</a>
            <a href="/game/start">🎯 Bắt Đầu</a>
            <a href="/leaderboard">🏆 BXH</a>
        </nav>
    </header>

    <main>
        <div class="vault">
            <h1 class="vault-title">
                <i class="fas fa-microchip"></i> KHỞI TẠO TÍN HIỆU
            </h1>

            <div class="notice error" th:if="${registerError}" th:text="${registerError}"></div>

            <form th:action="@{/register}" th:object="${registerForm}" method="post">
                <div class="field">
                    <label>Lập Định Danh (Username)</label>
                    <div class="input-wrap">
                        <i class="fas fa-terminal"></i>
                        <input type="text" th:field="*{username}" placeholder="nhập định danh..." required
                            autocomplete="off">
                    </div>
                    <small th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
                </div>

                <div class="field">
                    <label>Căn Cước Điệp Viên (Tên Hiển Thị)</label>
                    <div class="input-wrap">
                        <i class="fas fa-user-tag"></i>
                        <input type="text" th:field="*{displayName}" placeholder="tên điệp viên..." required>
                    </div>
                    <small th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></small>
                </div>

                <div class="field">
                    <label>Thiết Lập Mã Khóa (Password)</label>
                    <div class="input-wrap">
                        <i class="fas fa-key"></i>
                        <input type="password" th:field="*{password}" placeholder="tạo mã khóa bảo mật..." required>
                    </div>
                    <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-satellite-dish"></i> ĐĂNG KÝ GHI DANH
                </button>
            </form>

            <div class="vault-footer">
                <span>> Đã có tín hiệu? </span>
                <a th:href="@{/login}">[Xác Thực Ngay]</a>
            </div>
        </div>
    </main>

    <footer>&gt; QUIZ ESCAPE ROOM · NEW PROTOCOL INIT &lt;</footer>
</body>

</html>
