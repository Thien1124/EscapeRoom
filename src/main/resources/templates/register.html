<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout-main :: layout('Đăng ký', ~{::section})}">

<body>
    <section>
        <style>
            .auth-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 80vh;
                background-color: transparent;
                font-family: 'Inter', 'Segoe UI', sans-serif;
                padding: 2rem;
            }

            .auth-card {
                background: #ffffff;
                border-radius: 12px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
                padding: 2.5rem;
                width: 100%;
                max-width: 450px;
            }

            .auth-title {
                font-size: 1.75rem;
                font-weight: 700;
                color: #1a1a1a;
                text-align: center;
                margin-bottom: 0.5rem;
            }

            .auth-subtitle {
                font-size: 0.95rem;
                color: #666;
                text-align: center;
                margin-bottom: 2rem;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            .form-label {
                display: block;
                font-size: 0.9rem;
                font-weight: 500;
                color: #333;
                margin-bottom: 0.5rem;
            }

            .form-control {
                width: 100%;
                padding: 0.85rem 1rem;
                font-size: 1rem;
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                background-color: #f8fafc;
                transition: all 0.2s;
                box-sizing: border-box;
            }

            .form-control:focus {
                border-color: #3b82f6;
                outline: none;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
                background-color: #fff;
            }

            .btn-primary {
                background-color: #3b82f6;
                color: #fff;
                border: none;
                padding: 0.85rem 1rem;
                font-size: 1rem;
                font-weight: 600;
                border-radius: 8px;
                width: 100%;
                cursor: pointer;
                transition: background-color 0.2s;
                margin-top: 1rem;
            }

            .btn-primary:hover {
                background-color: #2563eb;
            }

            .form-footer {
                text-align: center;
                margin-top: 1.5rem;
                font-size: 0.95rem;
                color: #64748b;
            }

            .form-footer a {
                color: #3b82f6;
                text-decoration: none;
                font-weight: 600;
            }

            .form-footer a:hover {
                text-decoration: underline;
            }

            .alert {
                padding: 0.85rem 1rem;
                border-radius: 8px;
                margin-bottom: 1.5rem;
                font-size: 0.95rem;
            }

            .alert-error {
                background-color: #fef2f2;
                color: #dc2626;
                border: 1px solid #fca5a5;
            }

            .error-text {
                color: #dc2626;
                font-size: 0.85rem;
                margin-top: 0.35rem;
                display: block;
            }
        </style>
        <div class="auth-wrapper">
            <div class="auth-card">
                <h2 class="auth-title">Đăng Ký Tài Khoản</h2>
                <p class="auth-subtitle">Tham gia giải đố ngay hôm nay</p>

                <div th:if="${registerError}" class="alert alert-error" th:text="${registerError}"></div>

                <form th:action="@{/register}" th:object="${registerForm}" method="post">
                    <div class="form-group">
                        <label class="form-label">Địa chỉ Email</label>
                        <input type="email" th:field="*{username}" class="form-control"
                            placeholder="VD: name@gmail.com (Dùng nhận OTP)" maxlength="50" required>
                        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                            class="error-text"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tên hiển thị</label>
                        <input type="text" th:field="*{displayName}" class="form-control"
                            placeholder="Tên hiển thị trong game" maxlength="50" required>
                        <span th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"
                            class="error-text"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" th:field="*{password}" class="form-control"
                            placeholder="Tối thiểu 6 ký tự" minlength="6" required>
                        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                            class="error-text"></span>
                    </div>

                    <div style="font-size: 0.85rem; color: #64748b; margin-top: 1rem;">
                        Bằng việc đăng ký, bạn đồng ý với Điều khoản và Chính sách của chúng tôi.
                    </div>

                    <button type="submit" class="btn-primary">Đăng Ký</button>
                </form>

                <div class="form-footer">
                    Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
