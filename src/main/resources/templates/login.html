<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống An Ninh - Đăng Nhập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #00ff41;
            --green-dim: rgba(0, 255, 65, 0.4);
            --dark: #0d0d0d;
        }

        body {
            background: var(--dark);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Scanlines overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 65, 0.015) 2px,
                    rgba(0, 255, 65, 0.015) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* Header */
        .topbar {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #1a1a1a;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.4rem;
            color: var(--green);
            text-decoration: none;
            text-shadow: 0 0 10px var(--green-dim);
            letter-spacing: 2px;
        }

        .brand::before {
            content: '> ';
        }

        .topbar-nav a {
            color: #555;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .topbar-nav a:hover {
            color: var(--green);
            text-shadow: 0 0 5px var(--green-dim);
        }

        /* Main content */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 1rem;
        }

        .vault {
            background: #050505;
            border: 1px solid #1a1a1a;
            border-top: 2px solid var(--green);
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.05), inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* Animated scan line */
        .vault::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            animation: scan-v 3s linear infinite;
            top: 0;
            box-shadow: 0 0 10px var(--green);
        }

        @keyframes scan-v {
            0% {
                top: 0;
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            95% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .vault-title {
            color: var(--green);
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #1a1a1a;
            text-shadow: 0 0 8px var(--green-dim);
        }

        .vault-title i {
            margin-right: 10px;
        }

        .notice {
            padding: 10px 12px;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
            border-left: 3px solid;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .notice.error {
            background: rgba(255, 0, 0, 0.08);
            border-color: #ff2200;
            color: #ff4422;
        }

        .notice.success {
            background: rgba(0, 255, 65, 0.07);
            border-color: var(--green);
            color: var(--green);
        }

        .notice::before {
            content: '>> ';
            font-weight: bold;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        .field label {
            display: block;
            color: #444;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #333;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .input-wrap input {
            width: 100%;
            background: #000;
            border: 1px solid #1e1e1e;
            color: var(--green);
            padding: 12px 12px 12px 36px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .input-wrap input:focus {
            border-color: var(--green);
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.2), inset 0 0 6px rgba(0, 255, 65, 0.05);
        }

        .input-wrap input:focus~i,
        .input-wrap:focus-within i {
            color: var(--green);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            font-family: inherit;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--green);
            color: #000;
            box-shadow: 0 0 20px var(--green-dim);
        }

        .vault-footer {
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px dashed #1a1a1a;
            text-align: center;
            font-size: 0.82rem;
            color: #333;
        }

        .vault-footer a {
            color: #555;
            text-decoration: none;
            transition: 0.3s;
        }

        .vault-footer a:hover {
            color: var(--green);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: #1a1a1a;
            font-size: 0.8rem;
            border-top: 1px solid #111;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .p {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--green);
            border-radius: 50%;
            animation: float-p linear infinite;
            opacity: 0;
        }

        @keyframes float-p {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-10px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>

    <header class="topbar">
        <a class="brand" href="/">Quiz Escape Room</a>
        <nav class="topbar-nav">
            <a href="/">🏠 Trang Chủ</a>
            <a href="/game/start">🎯 Bắt Đầu</a>
            <a href="/leaderboard">🏆 BXH</a>
        </nav>
    </header>

    <main>
        <div class="vault">
            <h1 class="vault-title">
                <i class="fas fa-fingerprint"></i> CỔNG XÁC THỰC
            </h1>

            <div class="notice success" th:if="${param.registered}">
                TẠO HỒ SƠ THÀNH CÔNG. YÊU CẦU XÁC THỰC.
            </div>
            <div class="notice error" th:if="${param.error}">
                TỪ CHỐI TRUY CẬP. MÃ XÁC THỰC SAI.
            </div>
            <div class="notice success" th:if="${param.logout}">
                KẾT NỐI ĐÃ NGẮT AN TOÀN.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label>Định Danh (Username)</label>
                    <div class="input-wrap">
                        <i class="fas fa-user-secret"></i>
                        <input type="text" name="username" placeholder="nhập định danh..." required autocomplete="off">
                    </div>
                </div>

                <div class="field">
                    <label>Mã Khóa (Password)</label>
                    <div class="input-wrap">
                        <i class="fas fa-key"></i>
                        <input type="password" name="password" placeholder="nhập mã khóa..." required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-unlock-alt"></i> GIẢI MÃ &amp; TRUY CẬP
                </button>
            </form>

            <div class="vault-footer">
                <span>> Chưa có hồ sơ? </span>
                <a th:href="@{/register}">[Khởi Tạo Ngay]</a>
            </div>
        </div>
    </main>

    <footer>
        &gt; QUIZ ESCAPE ROOM · SECURE TERMINAL v2.0 &lt;
    </footer>

    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'p';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            p.style.animationDelay = (Math.random() * 15) + 's';
            p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
            container.appendChild(p);
        }
    </script>
</body>

</html>
