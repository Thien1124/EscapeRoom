<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout-main :: layout('Đăng nhập', ~{::section})}">
<head>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --danger-gradient: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --card-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        /* Auth Page Container */
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .auth-page::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-gradient);
            z-index: -2;
        }

        /* Floating Shapes */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float-around 20s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            top: 50%;
            right: -100px;
            animation-delay: -5s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            bottom: -75px;
            left: 30%;
            animation-delay: -10s;
        }

        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            top: 30%;
            left: 10%;
            animation-delay: -15s;
        }

        @keyframes float-around {
            0%, 100% { 
                transform: translateY(0) rotate(0deg) scale(1); 
            }
            25% { 
                transform: translateY(-30px) rotate(90deg) scale(1.1); 
            }
            50% { 
                transform: translateY(-50px) rotate(180deg) scale(1); 
            }
            75% { 
                transform: translateY(-20px) rotate(270deg) scale(0.9); 
            }
        }

        /* Floating Icons */
        .floating-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .float-icon {
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.15);
            animation: icon-float 15s ease-in-out infinite;
        }

        .float-icon:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .float-icon:nth-child(2) { top: 20%; right: 10%; animation-delay: -3s; }
        .float-icon:nth-child(3) { top: 60%; left: 8%; animation-delay: -6s; }
        .float-icon:nth-child(4) { top: 70%; right: 5%; animation-delay: -9s; }
        .float-icon:nth-child(5) { top: 40%; left: 15%; animation-delay: -12s; }
        .float-icon:nth-child(6) { bottom: 20%; right: 15%; animation-delay: -4s; }

        @keyframes icon-float {
            0%, 100% { 
                transform: translateY(0) rotate(0deg); 
                opacity: 0.15;
            }
            50% { 
                transform: translateY(-40px) rotate(180deg); 
                opacity: 0.3;
            }
        }

        /* Hero Section 3D */
        .app-hero {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 2.5rem 3rem;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
            text-align: center;
            margin-bottom: 2rem;
            transform: perspective(1000px) rotateX(5deg);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }

        .app-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 8s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-hero:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-10px);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.3);
        }

        .app-hero h1 {
            margin: 0 0 1rem 0;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            position: relative;
            z-index: 1;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .app-hero h1 i {
            font-size: 2.5rem;
            animation: door-swing 3s ease-in-out infinite;
        }

        @keyframes door-swing {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(20deg); }
        }

        .app-hero p {
            margin: 0;
            opacity: 0.95;
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        .app-hero p i {
            margin-right: 0.5rem;
        }

        /* Auth Card 3D */
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
            max-width: 450px;
            width: 100%;
            transform: perspective(1000px) rotateX(-5deg);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(255, 255, 255, 0.4), 
                transparent
            );
            transition: left 0.7s ease;
        }

        .auth-card:hover::before {
            left: 100%;
        }

        .auth-card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-10px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
        }

        .auth-card h2 {
            margin: 0 0 2rem 0;
            font-size: 2rem;
            text-align: center;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .auth-card h2::before {
            content: '\f2f6';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            -webkit-text-fill-color: #667eea;
            font-size: 1.8rem;
        }

        /* Notice Messages 3D */
        .notice {
            padding: 1rem 1.5rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateX(-30px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        .notice::before {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.3rem;
        }

        .notice.success {
            background: linear-gradient(135deg, rgba(17, 153, 142, 0.15) 0%, rgba(56, 239, 125, 0.15) 100%);
            border-left: 4px solid #38ef7d;
            color: #0d7a6e;
        }

        .notice.success::before {
            content: '\f058';
            color: #38ef7d;
        }

        .notice.error {
            background: linear-gradient(135deg, rgba(235, 51, 73, 0.15) 0%, rgba(244, 92, 67, 0.15) 100%);
            border-left: 4px solid #f45c43;
            color: #c0392b;
        }

        .notice.error::before {
            content: '\f06a';
            color: #f45c43;
        }

        /* Form Grid */
        .grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Input Fields 3D */
        .field {
            position: relative;
        }

        .field label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: #444;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .field label::before {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #667eea;
        }

        .field:nth-child(1) label::before {
            content: '\f007';
        }

        .field:nth-child(2) label::before {
            content: '\f023';
        }

        .field input {
            width: 100%;
            padding: 1rem 1.2rem 1rem 3rem;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8f9ff;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .field::after {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 1rem;
            bottom: 1rem;
            color: #aaa;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .field:nth-child(1)::after {
            content: '\f007';
        }

        .field:nth-child(2)::after {
            content: '\f023';
        }

        .field input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2),
                        0 10px 30px rgba(102, 126, 234, 0.15);
            transform: translateY(-3px);
        }

        .field:focus-within::after {
            color: #667eea;
            transform: scale(1.1);
        }

        .field input:focus + .input-glow {
            opacity: 1;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 1rem;
            bottom: 1rem;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 0;
        }

        .password-toggle:hover {
            color: #667eea;
            transform: scale(1.1);
        }

        /* Actions */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        /* Buttons 3D */
        button[type="submit"], .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1.1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        button[type="submit"]::before, .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        button[type="submit"]:hover::before, .btn:hover::before {
            width: 400px;
            height: 400px;
        }

        button[type="submit"] {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]::after {
            content: '\f2f6';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        button[type="submit"]:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.5);
        }

        button[type="submit"]:active {
            transform: translateY(-2px);
        }

        .btn.secondary {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .btn.secondary::after {
            content: '\f234';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        .btn.secondary:hover {
            background: var(--primary-gradient);
            color: white;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 1rem;
        }

        /* Social Login (Optional) */
        .social-login {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .social-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .social-btn.google {
            background: linear-gradient(135deg, #ea4335 0%, #fbbc05 50%, #34a853 100%);
        }

        .social-btn.facebook {
            background: linear-gradient(135deg, #1877f2 0%, #42b72a 100%);
        }

        .social-btn.github {
            background: linear-gradient(135deg, #24292e 0%, #586069 100%);
        }

        /* Footer Links */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .auth-footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-page {
                padding: 1rem;
            }

            .app-hero {
                padding: 2rem;
            }

            .app-hero h1 {
                font-size: 1.8rem;
                flex-direction: column;
            }

            .auth-card {
                padding: 2rem 1.5rem;
            }

            .auth-card h2 {
                font-size: 1.5rem;
            }

            .actions {
                gap: 0.8rem;
            }

            button[type="submit"], .btn {
                padding: 1rem 1.5rem;
                font-size: 1rem;
            }
        }

        /* Loading Animation */
        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '\f110' !important;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Particles (Optional Enhancement) */
        .particle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: particle-float 10s ease-in-out infinite;
        }

        @keyframes particle-float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<section class="auth-page">
    <!-- Floating Background Shapes -->
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Floating Icons -->
    <div class="floating-icons">
        <i class="fas fa-question float-icon"></i>
        <i class="fas fa-trophy float-icon"></i>
        <i class="fas fa-star float-icon"></i>
        <i class="fas fa-puzzle-piece float-icon"></i>
        <i class="fas fa-gamepad float-icon"></i>
        <i class="fas fa-key float-icon"></i>
    </div>

    <!-- Hero Section -->
    <section class="card app-hero">
        <h1>
            <i class="fas fa-door-open"></i>
            Quiz Escape Room
        </h1>
        <p>
            <i class="fas fa-key"></i>
            Đăng nhập để tiếp tục hành trình point & click.
        </p>
    </section>

    <!-- Login Card -->
    <div class="card auth-card">
        <h2>Đăng nhập</h2>

        <!-- Notice Messages -->
        <div class="notice success" th:if="${param.registered}">
            Đăng ký thành công, vui lòng đăng nhập.
        </div>
        <div class="notice error" th:if="${param.error}">
            Sai tài khoản hoặc mật khẩu.
        </div>
        <div class="notice success" th:if="${param.logout}">
            Bạn đã đăng xuất thành công.
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" class="grid">
            <div class="field">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" placeholder="Nhập tên đăng nhập..." required>
            </div>
            
            <div class="field">
                <label>Mật khẩu</label>
                <input type="password" name="password" id="password" placeholder="Nhập mật khẩu..." required>
                <button type="button" class="password-toggle" onclick="togglePassword()">
                    <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
            </div>

            <div class="actions">
                <button type="submit">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
                
                <div class="divider">
                    <span>hoặc</span>
                </div>
                
                <a class="btn secondary" th:href="@{/register}">
                    <i class="fas fa-user-plus"></i>
                    Đăng ký tài khoản mới
                </a>
            </div>
        </form>

        <!-- Social Login (Optional) -->
        <div class="social-login">
            <a href="#" class="social-btn google" title="Đăng nhập với Google">
                <i class="fab fa-google"></i>
            </a>
            <a href="#" class="social-btn facebook" title="Đăng nhập với Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="#" class="social-btn github" title="Đăng nhập với GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>

        <!-- Footer -->
        <div class="auth-footer">
            <p>
                <i class="fas fa-shield-alt"></i>
                Quên mật khẩu? <a href="#">Khôi phục tại đây</a>
            </p>
        </div>
    </div>
</section>

<script>
    // Toggle Password Visibility
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // Add floating particles dynamically
    function createParticles() {
        const colors = ['#667eea', '#764ba2', '#f093fb', '#38ef7d'];
        
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.width = (5 + Math.random() * 10) + 'px';
            particle.style.height = particle.style.width;
            document.body.appendChild(particle);
        }
    }
    
    createParticles();

    // Button loading state on submit
    document.querySelector('form').addEventListener('submit', function() {
        const btn = this.querySelector('button[type="submit"]');
        btn.classList.add('btn-loading');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đăng nhập...';
    });
</script>
</html>
