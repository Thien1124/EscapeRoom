<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout-main :: layout('Đăng nhập', ~{::section})}">
<section class="auth-page">
    <section class="card app-hero">
        <h1>Quiz Escape Room</h1>
        <p>Đăng nhập để tiếp tục hành trình point & click.</p>
    </section>

    <div class="card auth-card">
        <h2>Đăng nhập</h2>

        <div class="notice success" th:if="${param.registered}">Đăng ký thành công, vui lòng đăng nhập.</div>
        <div class="notice error" th:if="${param.error}">Sai tài khoản hoặc mật khẩu.</div>
        <div class="notice success" th:if="${param.logout}">Bạn đã đăng xuất.</div>

        <form th:action="@{/login}" method="post" class="grid">
            <div class="field">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" required>
            </div>
            <div class="field">
                <label>Mật khẩu</label>
                <input type="password" name="password" required>
            </div>
            <div class="actions">
                <button type="submit">Đăng nhập</button>
                <a class="btn secondary" th:href="@{/register}">Đăng ký tài khoản</a>
            </div>
        </form>
    </div>
</section>
</html>
