<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Quiz Escape Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/game.css(v='20260319-1')}">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --dark: #0f172a;
            --dark-lighter: #1e293b;
            --accent: #06b6d4;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            perspective: 1500px;
            overflow-x: hidden;
            overflow-y: scroll;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.3) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* 3D Header */
        .app-topbar {
            position: relative;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(99, 102, 241, 0.3);
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.3),
                0 0 80px rgba(99, 102, 241, 0.2);
            transform-style: preserve-3d;
            z-index: 100;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateZ(0px) rotateX(0deg); }
            50% { transform: translateZ(10px) rotateX(-1deg); }
        }

        .app-topbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #ec4899, #06b6d4);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            position: relative;
            transform: translateZ(30px);
            animation: gradientShift 4s ease infinite;
            transition: transform 0.3s ease;
        }

        .brand:hover {
            transform: translateZ(50px) scale(1.05);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .top-nav {
            display: flex;
            gap: 1rem;
            transform: translateZ(20px);
        }

        .top-nav a {
            color: #fff;
            text-decoration: none;
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .top-nav a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.6), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .top-nav a:hover::before {
            width: 300px;
            height: 300px;
        }

        .top-nav a:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            transform: translateY(-3px) translateZ(10px);
            box-shadow: 
                0 10px 30px rgba(99, 102, 241, 0.4),
                0 0 40px rgba(99, 102, 241, 0.2);
        }

        /* 3D Main Content */
        .page {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
        }

        .app-shell {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            padding: 3rem;
            box-shadow: 
                0 30px 90px rgba(0, 0, 0, 0.3),
                0 0 100px rgba(99, 102, 241, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            transform: translateZ(50px);
        }

        @keyframes cardFloat {
            0%, 100% { 
                transform: translateZ(50px) rotateX(0deg) rotateY(0deg); 
            }
            33% { 
                transform: translateZ(60px) rotateX(2deg) rotateY(-1deg); 
            }
            66% { 
                transform: translateZ(40px) rotateX(-1deg) rotateY(2deg); 
            }
        }

        /* 3D Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0) translateZ(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) translateZ(100px) scale(1.5);
                opacity: 0;
            }
        }

        /* 3D Footer */
        .app-footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
            transform: translateZ(20px);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* Hover Effects */
        .app-shell::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #6366f1, #ec4899, #06b6d4, #10b981);
            background-size: 400% 400%;
            border-radius: 30px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.5s;
            animation: gradientRotate 8s ease infinite;
        }

        @keyframes gradientRotate {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .app-shell:hover::before {
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-topbar-inner {
                flex-direction: column;
                gap: 1rem;
            }

            .top-nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .brand {
                font-size: 1.5rem;
            }

            .app-shell {
                padding: 1.5rem;
                margin: 1rem;
            }
        }

        /* Loading Animation */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .loading {
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.1) 25%, 
                rgba(255,255,255,0.3) 50%, 
                rgba(255,255,255,0.1) 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }
    </style>
</head>
<body class="theme-main">
    <!-- Particle Background -->
    <div class="particles" id="particles"></div>

    <header class="app-topbar">
        <div class="app-topbar-inner">
            <a class="brand" th:href="@{/}">🎮 Quiz Escape Room</a>
            <nav class="top-nav">
                <a th:href="@{/}">🏠 Trang chủ</a>
                <a th:href="@{/game/start}">🎯 Bắt đầu</a>
                <a th:href="@{/leaderboard}">🏆 BXH</a>
                <a th:href="@{/history}">📊 Lịch sử</a>
            </nav>
        </div>
    </header>

    <main class="page app-shell">
        <th:block th:replace="${content}"></th:block>
    </main>

    <footer class="app-footer">
        <span>✨ Quiz Escape Room · Point & Click · 2D Experience ✨</span>
    </footer>

    <script>
        // Generate 3D Particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // Keep app shell stable on all pages to avoid unwanted tilt/shake.
        function initShellTilt() {
            const shell = document.querySelector('.app-shell');
            if (shell) {
                shell.style.transform = 'translateZ(50px)';
            }
        }

        // Initialize
        createParticles();
        initShellTilt();

        // Page transition effect
        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.5s';
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
