<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Gameplay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/game.css(v='20260319-1')}">
</head>
<body class="theme-game">
<header class="game-topbar">
    <a class="brand" th:href="@{/}">Quiz Escape Room</a>
    <a class="btn secondary" th:href="@{/game/start}">Chọn lại game</a>
</header>

<main class="page app-shell game-shell">
    <th:block th:replace="${content}"></th:block>
</main>

<footer class="app-footer game-footer">
    <span>Gameplay Mode</span>
</footer>
</body>
</html>
