<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Gameplay</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Game CSS -->
    <link rel="stylesheet" th:href="@{/styles/game.css(v='20260319-1')}">
    
    <style>
        /* ==================== BASE RESET ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #06b6d4;
            --secondary-glow: rgba(6, 182, 212, 0.5);
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.5);
            --danger: #ef4444;
            --success: #10b981;
            --dark: #0a0a0f;
            --dark-card: rgba(15, 15, 25, 0.9);
            --dark-lighter: #1a1a2e;
            --text: #e2e8f0;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        /* ==================== BODY & BACKGROUND ==================== */
        body.theme-game {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Gradient Background */
        body.theme-game::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 0%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Grid Pattern Overlay */
        body.theme-game::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* ==================== GAME HEADER ==================== */
        .game-topbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            background: linear-gradient(180deg, 
                rgba(10, 10, 15, 0.98) 0%, 
                rgba(26, 26, 46, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.5),
                0 0 50px rgba(139, 92, 246, 0.1),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Glowing line animation */
        .game-topbar::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--primary), 
                var(--secondary), 
                var(--accent),
                transparent);
            background-size: 200% 100%;
            animation: glowLine 3s linear infinite;
        }

        @keyframes glowLine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Brand Logo */
        .brand {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
        }

        .brand::before {
            content: '\f11b';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .brand:hover {
            transform: translateX(5px);
        }

        .brand:hover::before {
            animation: iconShake 0.5s ease;
        }

        @keyframes iconShake {
            0%, 100% { transform: rotate(0deg) scale(1.1); }
            25% { transform: rotate(-15deg) scale(1.1); }
            75% { transform: rotate(15deg) scale(1.1); }
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .btn i {
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        /* Secondary Button (Cyber Style) */
        .btn.secondary {
            background: linear-gradient(135deg, 
                rgba(139, 92, 246, 0.1) 0%, 
                rgba(6, 182, 212, 0.1) 100%);
            color: var(--text);
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 
                0 0 20px rgba(139, 92, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn.secondary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.2), 
                transparent);
            transition: left 0.5s;
        }

        .btn.secondary:hover::before {
            left: 100%;
        }

        .btn.secondary:hover {
            background: linear-gradient(135deg, 
                rgba(139, 92, 246, 0.3) 0%, 
                rgba(6, 182, 212, 0.3) 100%);
            border-color: var(--primary);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 10px 30px rgba(139, 92, 246, 0.3),
                0 0 40px rgba(139, 92, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn.secondary:hover i {
            transform: translateX(-3px);
        }

        /* Primary Button (Neon Style) */
        .btn.primary {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: #fff;
            border: none;
            box-shadow: 
                0 4px 20px var(--primary-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn.primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 10px 40px var(--primary-glow),
                0 0 60px rgba(139, 92, 246, 0.4);
        }

        /* ==================== MAIN GAME AREA ==================== */
        .page.game-shell {
            position: relative;
            z-index: 1;
            width: min(96vw, 1500px);
            max-width: 1500px;
            margin: 1rem auto;
            padding: 1.1rem;
        }

        .app-shell.game-shell {
            background: linear-gradient(145deg, 
                rgba(15, 15, 25, 0.95) 0%, 
                rgba(26, 26, 46, 0.9) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 1.35rem;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(139, 92, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Corner Decorations */
        .app-shell.game-shell::before,
        .app-shell.game-shell::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid transparent;
            pointer-events: none;
        }

        .app-shell.game-shell::before {
            top: -1px;
            left: -1px;
            border-top-color: var(--primary);
            border-left-color: var(--primary);
            border-radius: 24px 0 0 0;
            box-shadow: 
                -5px -5px 20px var(--primary-glow),
                inset 5px 5px 20px var(--primary-glow);
        }

        .app-shell.game-shell::after {
            bottom: -1px;
            right: -1px;
            border-bottom-color: var(--secondary);
            border-right-color: var(--secondary);
            border-radius: 0 0 24px 0;
            box-shadow: 
                5px 5px 20px var(--secondary-glow),
                inset -5px -5px 20px var(--secondary-glow);
        }

        /* Scan Line Effect */
        .app-shell.game-shell .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--primary-glow), 
                var(--secondary-glow),
                transparent);
            animation: scanMove 4s linear infinite;
            pointer-events: none;
            opacity: 0.5;
        }

        @keyframes scanMove {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* ==================== GAME FOOTER ==================== */
        .game-footer {
            text-align: center;
            padding: 1.5rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .game-footer span {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 2rem;
            background: rgba(15, 15, 25, 0.8);
            border-radius: 50px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .game-footer span::before {
            content: '\f04b';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--success);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ==================== FLOATING PARTICLES ==================== */
        .game-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .g-particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) rotate(36deg) scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg) scale(0.5);
                opacity: 0;
            }
        }

        /* ==================== HUD ELEMENTS (Optional) ==================== */
        .game-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            margin-bottom: 1.5rem;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .hud-item i {
            font-size: 1.2rem;
        }

        .hud-item.score i { color: var(--accent); }
        .hud-item.time i { color: var(--danger); }
        .hud-item.level i { color: var(--success); }
        .hud-item.lives i { color: var(--danger); }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .game-topbar {
                padding: 0.8rem 1rem;
                flex-wrap: wrap;
                gap: 0.8rem;
            }

            .brand {
                font-size: 1.1rem;
            }

            .brand::before {
                font-size: 1.3rem;
            }

            .btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .page.game-shell {
                padding: 1rem;
                margin: 1rem;
            }

            .app-shell.game-shell {
                padding: 1.5rem;
                border-radius: 20px;
            }

            .game-hud {
                flex-wrap: wrap;
                gap: 1rem;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .brand span:not(.brand-icon) {
                display: none;
            }

            .btn span {
                display: none;
            }

            .btn i {
                margin: 0;
            }
        }
    </style>
</head>
<body class="theme-game">
    <!-- Floating Particles -->
    <div class="game-particles" id="gameParticles"></div>

    <!-- Game Header -->
    <header class="game-topbar">
        <a class="brand" th:href="@{/}">
            <span>Quiz Escape Room</span>
        </a>
        <a class="btn secondary" th:href="@{/game/start}">
            <i class="fas fa-rotate-left"></i>
            <span>Chọn lại game</span>
        </a>
    </header>

    <!-- Main Game Area -->
    <main class="page app-shell game-shell">
        <!-- Scan Line Effect -->
        <div class="scanline"></div>
        
        <!-- Game Content -->
        <th:block th:replace="${content}"></th:block>
    </main>

    <!-- Game Footer -->
    <footer class="app-footer game-footer">
        <span>Gameplay Mode</span>
    </footer>

    <!-- JavaScript -->
    <script>
        // ==================== PARTICLE SYSTEM ====================
        function createGameParticles() {
            const container = document.getElementById('gameParticles');
            const colors = [
                'rgba(139, 92, 246, 0.6)',   // Purple
                'rgba(6, 182, 212, 0.6)',    // Cyan
                'rgba(245, 158, 11, 0.6)',   // Orange
                'rgba(16, 185, 129, 0.6)',   // Green
                'rgba(236, 72, 153, 0.6)'    // Pink
            ];

            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'g-particle';
                
                const size = Math.random() * 8 + 3;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const duration = Math.random() * 20 + 15;
                const delay = Math.random() * 15;
                const left = Math.random() * 100;

                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${left}%;
                    background: ${color};
                    box-shadow: 0 0 ${size * 3}px ${color}, 0 0 ${size * 6}px ${color};
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;

                container.appendChild(particle);
            }
        }

        // ==================== 3D TILT EFFECT ====================
        function init3DTilt() {
            const gameShell = document.querySelector('.app-shell.game-shell');
            const isRoomView = !!document.querySelector('.room-page');
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // Keep room gameplay canvas/frame stable, no shell tilt.
            if (isRoomView && gameShell) {
                gameShell.style.transform = 'none';
                return;
            }
            
            if (gameShell && !reduceMotion && window.innerWidth > 1200) {
                gameShell.addEventListener('mousemove', (e) => {
                    const rect = gameShell.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = (y - centerY) / 120;
                    const rotateY = (centerX - x) / 120;

                    gameShell.style.transform = `
                        perspective(1000px) 
                        rotateX(${rotateX}deg) 
                        rotateY(${rotateY}deg)
                        translateZ(10px)
                    `;
                });

                gameShell.addEventListener('mouseleave', () => {
                    gameShell.style.transform = `
                        perspective(1000px) 
                        rotateX(0deg) 
                        rotateY(0deg)
                        translateZ(0px)
                    `;
                });
            }
        }

        // ==================== SOUND EFFECTS (Optional) ====================
        function playHoverSound() {
            // Add sound effects if needed
            // const audio = new Audio('/sounds/hover.mp3');
            // audio.volume = 0.1;
            // audio.play();
        }

        // Add hover sounds to buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('mouseenter', playHoverSound);
        });

        // ==================== INITIALIZE ====================
        document.addEventListener('DOMContentLoaded', () => {
            createGameParticles();
            init3DTilt();

            // Page load animation
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.6s ease';
                document.body.style.opacity = '1';
            }, 100);
        });

        // ==================== KEYBOARD SHORTCUTS (Optional) ====================
        document.addEventListener('keydown', (e) => {
            // ESC to go back
            if (e.key === 'Escape') {
                window.location.href = '/game/start';
            }
        });
    </script>
</body>
</html>
