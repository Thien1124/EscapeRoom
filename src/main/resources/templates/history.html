<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout-main :: layout('Lịch sử chơi', ~{::section})}">
<head>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --danger-gradient: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            --card-shadow: 0 20px 60px rgba(0,0,0,0.15);
            --card-hover-shadow: 0 30px 80px rgba(0,0,0,0.25);
        }

        /* Hero Section 3D */
        .app-hero {
            background: var(--primary-gradient);
            color: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            transform: translateZ(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .app-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .app-hero:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--card-hover-shadow);
        }

        .app-hero h1 {
            margin: 0 0 1rem 0;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .app-hero p {
            margin: 0;
            opacity: 0.95;
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        /* Table Card 3D */
        .table-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            transform: translateZ(0);
            transition: all 0.3s ease;
        }

        .table-card:hover {
            box-shadow: var(--card-hover-shadow);
        }

        /* Modern Table */
        .table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin: 0;
        }

        .table thead tr {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .table thead th {
            padding: 1.2rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table thead th:first-child {
            border-radius: 10px 0 0 10px;
        }

        .table thead th:last-child {
            border-radius: 0 10px 10px 0;
        }

        .table tbody tr {
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
        }

        .table tbody tr:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .table tbody td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            border: none;
            background: linear-gradient(to right, #f8f9ff 0%, white 100%);
        }

        .table tbody td:first-child {
            border-radius: 10px 0 0 10px;
            font-weight: 600;
            color: #667eea;
        }

        .table tbody td:last-child {
            border-radius: 0 10px 10px 0;
        }

        /* Badge 3D Effects */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .badge.ok {
            background: var(--success-gradient);
            color: white;
        }

        .badge.lock {
            background: var(--danger-gradient);
            color: white;
        }

        .badge.score {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 1.1rem;
            padding: 0.6rem 1.2rem;
        }

        /* Icon Animations */
        .icon-spin {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .icon-bounce {
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .icon-pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #999;
        }

        .empty-state i {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #666;
        }

        /* Actions */
        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn.secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Statistics Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-10px) rotateX(5deg);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .stat-card i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin: 0.5rem 0;
            color: #333;
        }

        .stat-card p {
            margin: 0;
            color: #999;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-hero h1 {
                font-size: 1.8rem;
                flex-direction: column;
            }

            .table {
                font-size: 0.85rem;
            }

            .table thead th,
            .table tbody td {
                padding: 0.8rem 0.5rem;
            }
        }
    </style>
</head>

<section>
    <!-- Hero Section -->
    <div class="card app-hero">
        <h1>
            <i class="fas fa-history icon-pulse"></i>
            Lịch sử chơi của tôi
        </h1>
        <p>
            <i class="fas fa-chart-line"></i>
            Theo dõi kết quả từng ván theo thời gian.
        </p>
    </div>

    <!-- Statistics Grid (Optional) -->
    <div class="stats-grid" th:if="${histories != null and !#lists.isEmpty(histories)}">
        <div class="stat-card">
            <i class="fas fa-gamepad" style="color: #667eea;"></i>
            <h3 th:text="${#lists.size(histories)}">0</h3>
            <p>Tổng số ván</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-trophy" style="color: #38ef7d;"></i>
            <h3 th:text="${#lists.size(histories.?[result.name() == 'WIN'])}">0</h3>
            <p>Thắng</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-times-circle" style="color: #f45c43;"></i>
            <h3 th:text="${#lists.size(histories.?[result.name() == 'LOSE'])}">0</h3>
            <p>Thua</p>
        </div>
    </div>

    <!-- Table Card -->
    <div class="card table-card">
        <table class="table">
            <thead>
            <tr>
                <th><i class="far fa-clock"></i> Thời gian</th>
                <th><i class="fas fa-door-open"></i> Phòng</th>
                <th><i class="fas fa-tag"></i> Chủ đề</th>
                <th><i class="fas fa-hand-pointer"></i> Lượt click</th>
                <th><i class="fas fa-star"></i> Điểm</th>
                <th><i class="fas fa-flag-checkered"></i> Kết quả</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${histories == null or #lists.isEmpty(histories)}">
                <td colspan="6">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>Chưa có lịch sử chơi</h3>
                        <p>Bắt đầu chơi để xem kết quả tại đây!</p>
                    </div>
                </td>
            </tr>
            <tr th:each="h : ${histories}">
                <td>
                    <i class="far fa-calendar-alt"></i>
                    <span th:text="${#temporals.format(h.playedAt, 'dd/MM/yyyy HH:mm')}"></span>
                </td>
                <td>
                    <i class="fas fa-users"></i>
                    <span th:text="${h.room.name}"></span>
                </td>
                <td>
                    <i class="fas fa-bookmark"></i>
                    <span th:text="${h.room.topic.name}"></span>
                </td>
                <td>
                    <span class="badge" th:text="${h.actionCount}">0</span>
                </td>
                <td>
                    <span class="badge score" th:text="${h.score}">
                        <i class="fas fa-star"></i>
                        <span th:text="${h.score}"></span>
                    </span>
                </td>
                <td>
                    <span class="badge ok" th:if="${h.result.name() == 'WIN'}">
                        <i class="fas fa-trophy"></i> WIN
                    </span>
                    <span class="badge lock" th:if="${h.result.name() == 'LOSE'}">
                        <i class="fas fa-times-circle"></i> LOSE
                    </span>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="actions">
            <a class="btn secondary" th:href="@{/}">
                <i class="fas fa-home"></i>
                Quay lại trang chủ
            </a>
        </div>
    </div>
</section>
</html>
