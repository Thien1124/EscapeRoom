<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout-main :: layout('Xác Nhận OTP', ~{::section})}">

<body>
    <section>
        <style>
            .auth-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 80vh;
                background-color: transparent;
                font-family: 'Inter', 'Segoe UI', sans-serif;
                padding: 2rem;
            }

            .auth-card {
                background: #ffffff;
                border-radius: 12px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
                padding: 2.5rem;
                width: 100%;
                max-width: 420px;
                text-align: center;
            }

            .auth-title {
                font-size: 1.75rem;
                font-weight: 700;
                color: #1a1a1a;
                margin-bottom: 0.5rem;
            }

            .auth-subtitle {
                font-size: 0.95rem;
                color: #666;
                margin-bottom: 2rem;
                line-height: 1.5;
            }

            .form-group {
                margin-bottom: 1.25rem;
                text-align: left;
            }

            .form-control {
                width: 100%;
                padding: 0.85rem 1rem;
                font-size: 1.2rem;
                letter-spacing: 0.2em;
                text-align: center;
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                background-color: #f8fafc;
                transition: all 0.2s;
                box-sizing: border-box;
                font-weight: bold;
            }

            .form-control:focus {
                border-color: #3b82f6;
                outline: none;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
                background-color: #fff;
            }

            .btn-primary {
                background-color: #3b82f6;
                color: #fff;
                border: none;
                padding: 0.85rem 1rem;
                font-size: 1rem;
                font-weight: 600;
                border-radius: 8px;
                width: 100%;
                cursor: pointer;
                transition: background-color 0.2s;
                margin-top: 1rem;
            }

            .btn-primary:hover {
                background-color: #2563eb;
            }

            .btn-secondary {
                background: none;
                border: none;
                color: #64748b;
                font-size: 0.9rem;
                font-weight: 500;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                margin-top: 1rem;
                transition: color 0.2s;
            }

            .btn-secondary:hover {
                color: #333;
                text-decoration: underline;
            }

            .alert {
                padding: 0.85rem 1rem;
                border-radius: 8px;
                margin-bottom: 1.5rem;
                font-size: 0.95rem;
                text-align: left;
            }

            .alert-error {
                background-color: #fef2f2;
                color: #dc2626;
                border: 1px solid #fca5a5;
            }

            .alert-success {
                background-color: #f0fdf4;
                color: #16a34a;
                border: 1px solid #86efac;
            }

            .email-highlight {
                font-weight: 600;
                color: #1e293b;
                background: #f1f5f9;
                padding: 2px 6px;
                border-radius: 4px;
            }
        </style>
        <div class="auth-wrapper">
            <div class="auth-card">
                <h2 class="auth-title">Xác Nhận OTP</h2>
                <p class="auth-subtitle">Một mã gồm 6 số đã được gửi tới email <br> <span class="email-highlight"
                        th:text="${username}"></span><br>Vui lòng nhập để bảo mật tài khoản.</p>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

                <form th:action="@{/verify-otp}" method="post">
                    <input type="hidden" name="username" th:value="${username}" />
                    <div class="form-group">
                        <input type="text" name="otpCode" class="form-control" placeholder="••••••" maxlength="6"
                            autocomplete="off" required>
                    </div>
                    <button type="submit" class="btn-primary">Kích Hoạt Tài Khoản</button>
                </form>

                <form th:action="@{/resend-otp}" method="post" style="display:inline;">
                    <input type="hidden" name="username" th:value="${username}" />
                    <button type="submit" class="btn-secondary">Chưa nhận được mã? Gửi lại</button>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
