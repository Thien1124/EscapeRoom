spring:
  application:
    name: Gamegiaido
  datasource:
    url: jdbc:h2:mem:gamegiaido
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false
      path: /h2-console

server:
  port: 8080
