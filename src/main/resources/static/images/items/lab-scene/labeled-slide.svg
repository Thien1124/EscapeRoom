    <linearGradient id="slideGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e3f2fd" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#90caf9" stop-opacity="0.55"/>
