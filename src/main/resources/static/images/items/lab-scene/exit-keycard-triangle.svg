<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Exit Keycard</title>
  <desc id="desc">Access keycard with EXIT logo and hidden triangle pattern.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eceff1"/>
      <stop offset="1" stop-color="#b0bec5"/>
    </linearGradient>
    <pattern id="triPattern" width="26" height="22" patternUnits="userSpaceOnUse">
      <path d="M13 2L24 20H2z" fill="#90a4ae" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="512" height="512" fill="#1b2630"/>
  <rect x="78" y="130" width="356" height="252" rx="20" fill="url(#cardBg)" stroke="#607d8b" stroke-width="6"/>
  <rect x="78" y="130" width="356" height="252" rx="20" fill="url(#triPattern)"/>

  <rect x="104" y="162" width="120" height="70" rx="8" fill="#263238"/>
  <rect x="244" y="166" width="162" height="18" rx="8" fill="#78909c"/>
  <rect x="244" y="198" width="118" height="14" rx="7" fill="#90a4ae"/>

  <text x="256" y="304" text-anchor="middle" font-family="sans-serif" font-size="54" font-weight="700" fill="#1b5e20">EXIT</text>
  <path d="M256 246l24 40h-48z" fill="#2e7d32" opacity="0.4"/>

  <rect x="104" y="334" width="128" height="20" rx="8" fill="#546e7a"/>
  <rect x="244" y="334" width="162" height="20" rx="8" fill="#90a4ae"/>
</svg>
